<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Core | Premium Esports</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --bg-base: #050505;
            --surface: rgba(18, 18, 23, 0.8);
            --surface-hover: rgba(28, 28, 35, 0.95);
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --secondary: #0ea5e9;
            --accent: #f43f5e;
            --success: #10b981;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            
            --font-display: 'Rajdhani', sans-serif;
            --font-body: 'Inter', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- GLOBAL RESETS --- */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            font-family: var(--font-body); 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            line-height: 1.6; 
            overflow-x: hidden; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        @keyframes fadeSlideUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- UI COMPONENTS --- */
        .glass { 
            background: var(--surface); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .btn { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            padding: 14px 24px; 
            font-family: var(--font-display); 
            font-size: 1.1rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            transition: var(--transition); 
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), #6d28d9); 
            color: white; 
            box-shadow: 0 4px 15px var(--primary-glow); 
        }
        
        .btn-primary:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(139,92,246,0.6); 
        }
        
        .btn-primary:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none; 
        }
        
        .btn-outline { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(255,255,255,0.15); 
            color: var(--text-main); 
        }
        
        .btn-outline:hover:not(:disabled) { 
            background: rgba(255,255,255,0.08); 
            border-color: var(--primary); 
            color: white; 
        }
        
        .btn-danger { 
            background: rgba(244, 63, 94, 0.1); 
            border: 1px solid var(--accent); 
            color: var(--accent); 
        }
        
        .btn-success { 
            background: rgba(16, 185, 129, 0.1); 
            border: 1px solid var(--success); 
            color: var(--success); 
        }

        /* --- FORMS & INPUTS --- */
        input, select, textarea { 
            width: 100%; 
            padding: 16px; 
            background: rgba(0,0,0,0.5); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            color: white; 
            font-family: var(--font-body); 
            font-size: 1rem; 
            transition: var(--transition); 
        }
        
        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: rgba(0,0,0,0.7); 
            box-shadow: 0 0 0 3px rgba(139,92,246,0.2); 
        }
        
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* --- BADGES & AVATARS --- */
        .badge { 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
        }
        .badge-live { background: rgba(244, 63, 94, 0.15); color: var(--accent); border: 1px solid var(--accent); }
        .badge-upcoming { background: rgba(14, 165, 233, 0.15); color: var(--secondary); border: 1px solid var(--secondary); }
        .badge-admin { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid var(--warning); }
        .badge-game { background: rgba(139, 92, 246, 0.15); color: #ddd6fe; border: 1px solid var(--primary); }
        
        .pfp { 
            width: 45px; 
            height: 45px; 
            border-radius: 12px; 
            object-fit: cover; 
            border: 2px solid var(--primary); 
            background: var(--surface); 
        }
        
        .pfp-lg { 
            width: 90px; 
            height: 90px; 
            border-radius: 20px; 
            border-width: 3px; 
        }

        /* --- NAVIGATION --- */
        nav.top-nav { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 1000; 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(5, 5, 5, 0.85); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--border); 
        }
        
        .logo { 
            font-family: var(--font-display); 
            font-size: 2rem; 
            font-weight: 800; 
            color: white; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer; 
        }
        
        .logo i { color: var(--primary); font-size: 2.5rem; }
        .nav-actions { display: flex; align-items: center; gap: 15px; }
        
        /* Mobile Bottom Nav */
        .bottom-nav { 
            display: none; 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: rgba(15, 15, 15, 0.95); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid var(--border); 
            z-index: 1000; 
            padding-bottom: env(safe-area-inset-bottom); 
        }
        
        .bottom-nav-inner { 
            display: flex; 
            justify-content: space-around; 
            padding: 8px 5px; 
        }
        
        .b-nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 6px; 
            color: var(--text-muted); 
            font-size: 0.75rem; 
            font-weight: 600; 
            cursor: pointer; 
            padding: 10px; 
            border-radius: 12px; 
            flex: 1; 
            transition: var(--transition); 
        }
        
        .b-nav-item i { font-size: 1.5rem; }
        .b-nav-item.active { color: var(--primary); background: rgba(139, 92, 246, 0.1); }

        /* --- LAYOUTS --- */
        #app-content { 
            margin-top: 90px; 
            padding: 30px 5%; 
            flex-grow: 1; 
            max-width: 1400px; 
            margin-left: auto; 
            margin-right: auto; 
            width: 100%; 
            animation: fadeSlideUp 0.4s ease-out; 
        }
        
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeSlideUp 0.4s ease-out; }

        .dashboard-layout { 
            display: grid; 
            grid-template-columns: 280px 1fr; 
            gap: 40px; 
        }
        
        .sidebar { 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            height: calc(100vh - 120px); 
            position: sticky; 
            top: 100px; 
        }
        
        .sidebar-item { 
            padding: 16px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: var(--transition); 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            color: var(--text-muted); 
            font-weight: 600;
            font-size: 1.05rem;
        }
        
        .sidebar-item:hover { background: rgba(255,255,255,0.03); color: white; }
        .sidebar-item.active { background: rgba(139, 92, 246, 0.15); color: white; border-left: 4px solid var(--primary); }
        .sidebar-item i { font-size: 1.5rem; color: var(--primary); }

        .grid-cards { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
        }
        
        .card { 
            padding: 28px; 
            transition: var(--transition); 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            border-color: rgba(139, 92, 246, 0.4); 
            background: var(--surface-hover); 
        }
        
        .stat-box { 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); 
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%); 
            text-align: center; 
        }
        
        .stat-value { 
            font-family: var(--font-display); 
            font-size: 3.5rem; 
            font-weight: 800; 
            color: white; 
            margin: 10px 0; 
        }

        /* --- MODALS & TOASTS --- */
        .modal-overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(10px); 
            z-index: 2000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        
        .modal-overlay.active { display: flex; animation: fadeSlideUp 0.3s; }
        
        .modal-content { 
            width: 100%; 
            max-width: 600px; 
            padding: 40px; 
            position: relative; 
            max-height: 90vh; 
            overflow-y: auto; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
        }
        
        .close-modal { 
            position: absolute; 
            top: 20px; right: 20px; 
            cursor: pointer; 
            color: var(--text-muted); 
            font-size: 2rem; 
            background: rgba(255,255,255,0.05); 
            border-radius: 50%; 
            padding: 5px; 
            transition: var(--transition); 
        }
        
        .close-modal:hover { color: white; background: var(--accent); }

        #toast-container { 
            position: fixed; 
            top: 25px; right: 25px; 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            pointer-events: none; 
        }
        
        .toast { 
            padding: 18px 24px; 
            border-radius: 12px; 
            color: white; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
            font-weight: 600; 
            pointer-events: auto; 
            background: var(--surface-hover); 
            border-left: 6px solid; 
            animation: fadeSlideUp 0.3s; 
        }

        /* --- TABLES & CHAT --- */
        .table-container { 
            overflow-x: auto; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            background: rgba(0,0,0,0.2); 
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        th, td { padding: 20px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.03); }
        th { color: var(--text-muted); font-weight: 700; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        
        .chat-container { 
            height: 450px; 
            display: flex; 
            flex-direction: column; 
            background: rgba(0,0,0,0.4); 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
        }
        
        .chat-messages { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .chat-msg { 
            padding: 15px 20px; 
            border-radius: 16px 16px 16px 4px; 
            background: rgba(255,255,255,0.05); 
            max-width: 85%; 
            align-self: flex-start; 
            display: flex;
            gap: 12px;
        }
        
        .chat-msg.mine { 
            background: rgba(139, 92, 246, 0.15); 
            border: 1px solid rgba(139, 92, 246, 0.3); 
            align-self: flex-end; 
            border-radius: 16px 16px 4px 16px; 
            flex-direction: row-reverse;
        }
        
        .chat-msg .author { 
            font-size: 0.8rem; 
            color: var(--secondary); 
            margin-bottom: 5px; 
            font-weight: 800; 
            text-transform: uppercase; 
        }
        
        .chat-msg.mine .author { text-align: right; color: var(--primary); }
        
        .chat-input { 
            display: flex; 
            padding: 15px; 
            background: rgba(0,0,0,0.8); 
            border-top: 1px solid var(--border); 
            gap: 10px; 
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 900px) {
            .dashboard-layout { grid-template-columns: 1fr; gap: 20px; }
            .sidebar { display: none; }
            .bottom-nav { display: block; }
            #app-content { margin-bottom: 90px; padding: 20px 15px; margin-top: 70px; }
            .modal-content { padding: 25px; }
            nav.top-nav { padding: 12px 15px; }
            h1 { font-size: 3rem !important; }
        }

        /* --- UTILITIES --- */
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .mt-2 { margin-top: 1rem; } .mt-3 { margin-top: 1.5rem; } .mt-4 { margin-top: 2rem; }
        .mb-2 { margin-bottom: 1rem; } .mb-3 { margin-bottom: 1.5rem; } .mb-4 { margin-bottom: 2rem; } 
        .text-center { text-align: center; } 
        .w-100 { width: 100%; } 
        .text-muted { color: var(--text-muted); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" onclick="navigate('landing')">
            <i class="ph-fill ph-hexagon"></i> NEXUS<span style="color:var(--primary)">CORE</span>
        </div>
        <div class="nav-actions" id="nav-desktop-actions"></div>
    </nav>

    <!-- Mobile Bottom Navigation -->
    <div id="mobile-bottom-nav" class="bottom-nav"></div>
    
    <!-- Modals and Toasts -->
    <div id="toast-container"></div>
    <div id="modal-container" class="modal-overlay">
        <div class="glass modal-content" id="modal-body"></div>
    </div>

    <main id="app-content">
        <!-- Landing View -->
        <section id="view-landing" class="view-section active">
            <div style="text-align:center; padding: 60px 0; max-width: 900px; margin: 0 auto;">
                <div class="badge badge-game mb-4" style="font-size:0.9rem; padding:8px 16px;">
                    <i class="ph-fill ph-shield-check"></i> Escrow Secured Scrims
                </div>
                <h1 style="font-family:var(--font-display); font-size:5rem; line-height:1; margin-bottom:20px; text-transform:uppercase;">
                    Dominate The <br><span style="color:var(--primary);">Arena</span>
                </h1>
                <p style="font-size:1.2rem; color:var(--text-muted); margin-bottom:40px;">
                    Compete in automated, escrow-secured tournaments. Verified hosts, zero-delay payouts, and instant verification.
                </p>
                <div style="display:flex; gap:20px; justify-content:center; flex-wrap:wrap;">
                    <button class="btn btn-primary" onclick="navigate('register')">
                        <i class="ph-bold ph-sword"></i> Start Competing
                    </button>
                    <button class="btn btn-outline" onclick="navigate('login')">
                        Host / Login
                    </button>
                </div>
            </div>
            
            <div class="mt-4">
                <h2 style="font-size: 2.2rem; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 25px;">
                    <i class="ph-fill ph-fire" style="color:var(--accent)"></i> Live & Upcoming Operations
                </h2>
                <div class="grid-cards" id="landing-tournaments-list">
                    <div class="glass p-4 text-center text-muted" style="grid-column:1/-1; padding:80px;">
                        <i class="ph-duotone ph-spinner ph-spin" style="font-size:4rem; color:var(--primary); margin-bottom:15px;"></i><br>
                        Syncing Database...
                    </div>
                </div>
            </div>
        </section>

        <!-- Auth View -->
        <section id="view-auth" class="view-section">
            <div class="glass" id="auth-box" style="max-width: 500px; margin: 60px auto; padding: 50px;"></div>
        </section>

        <!-- Player Dashboard -->
        <section id="view-player-dash" class="view-section">
            <div class="dashboard-layout">
                <div class="glass sidebar" id="player-sidebar"></div>
                <div id="player-dash-content"></div>
            </div>
        </section>

        <!-- Host Dashboard -->
        <section id="view-host-dash" class="view-section">
            <div class="dashboard-layout">
                <div class="glass sidebar" id="host-sidebar"></div>
                <div id="host-dash-content"></div>
            </div>
        </section>

        <!-- Admin Dashboard -->
        <section id="view-admin-dash" class="view-section">
            <div class="dashboard-layout">
                <div class="glass sidebar" id="admin-sidebar"></div>
                <div id="admin-dash-content"></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, addDoc, updateDoc, deleteDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ_c3EaDxSZ6RrNrwQjR_TauJHrPfk_lk",
            authDomain: "designsnap-f3309.firebaseapp.com",
            databaseURL: "https://designsnap-f3309-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "designsnap-f3309"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- GLOBAL STATE ---
        let state = { 
            user: null, 
            userData: null, 
            currentView: 'landing', 
            activeTab: 'overview', 
            upiId: "nexuscore@okaxis", 
            platformFee: 0.10, 
            unsubs: [] 
        };

        // Default Avatar silhouette
        const DEFAULT_PFP = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23a1a1aa"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
        
        // Dynamic Game Forms
        const GAME_CONFIG = {
            "BGMI": { modes: ["Solo", "Duo", "Squad"], maps: ["Erangel", "Miramar", "Sanhok", "Livik"] },
            "Free Fire": { modes: ["Solo", "Duo", "Squad", "Clash Squad"], maps: ["Bermuda", "Purgatory", "Kalahari", "Alpine"] },
            "Among Us": { modes: ["Standard", "Hide & Seek"], maps: ["The Skeld", "Polus", "Airship"], extra: "Impostor Count" },
            "Valorant": { modes: ["Standard 5v5", "Swiftplay", "Deathmatch"], maps: ["Bind", "Haven", "Ascent", "Split"] }
        };

        // --- UTILITY FUNCTIONS ---
        const UI = {
            toast: (msg, type = 'success') => {
                const container = document.getElementById('toast-container'); 
                const toast = document.createElement('div'); 
                toast.className = `toast ${type}`;
                toast.style.borderLeftColor = type === 'success' ? 'var(--success)' : 'var(--accent)';
                toast.innerHTML = `<i class="ph-fill ${type === 'success' ? 'ph-check-circle' : 'ph-warning-circle'}" style="font-size:1.8rem; color:${type === 'success' ? 'var(--success)' : 'var(--accent)'}"></i> <span>${msg}</span>`;
                container.appendChild(toast); 
                
                setTimeout(() => { 
                    toast.style.opacity = '0'; 
                    setTimeout(() => toast.remove(), 300); 
                }, 4000);
            },
            modal: (html) => { 
                document.getElementById('modal-body').innerHTML = `<i class="ph-bold ph-x close-modal" onclick="closeModal()"></i>` + html; 
                document.getElementById('modal-container').classList.add('active'); 
            },
            closeModal: () => {
                document.getElementById('modal-container').classList.remove('active');
            },
            loadBtn: (id, load, txt = 'Loading...') => { 
                const btn = document.getElementById(id); 
                if(!btn) return; 
                if(load) { 
                    btn.dataset.o = btn.innerHTML; 
                    btn.innerHTML = `<i class="ph-bold ph-spinner ph-spin"></i> ${txt}`; 
                    btn.disabled = true; 
                } else { 
                    btn.innerHTML = btn.dataset.o; 
                    btn.disabled = false; 
                } 
            },
            esc: (str) => String(str||'').replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag])),
            getPfp: (url) => (url && url.trim() !== '') ? url : DEFAULT_PFP,
            clearListeners: () => { 
                state.unsubs.forEach(unsub => unsub()); 
                state.unsubs = []; 
            }
        };

        // Expose functions to window for inline HTML handlers
        window.closeModal = UI.closeModal;
        window.logoutUser = () => { 
            signOut(auth).then(() => location.reload()); 
        };
        window.goDash = () => { 
            if(state.userData) navigate(state.userData.role + '-dash'); 
            else navigate('login'); 
        };

        // --- NAVIGATION & ROUTING ---
        window.navigate = (view) => {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            UI.clearListeners();
            
            if(view === 'login' || view === 'register') { 
                document.getElementById('view-auth').classList.add('active'); 
                renderAuthForm(view); 
            } else { 
                const target = document.getElementById(`view-${view}`); 
                if(target) target.classList.add('active');
                
                if(view === 'landing') bindLandingTournaments();
                else if(view === 'player-dash') renderDashboard('player');
                else if(view === 'host-dash') renderDashboard('host');
                else if(view === 'admin-dash') renderDashboard('admin');
            }
            state.currentView = view; 
            window.scrollTo(0,0);
        };

        const updateNavUI = () => {
            const topNav = document.getElementById('nav-desktop-actions'); 
            const botNav = document.getElementById('mobile-bottom-nav');

        // --- AUTHENTICATION LISTENER ---

        // --- DASHBOARD ROUTER ---

            const unsub = onSnapshot(collection(db, "tournaments"), (snap) => {
                const container = document.getElementById(cId);

                let tournaments = []; 
                snap.forEach(d => tournaments.push({ id: d.id, ...d.data() }));
                
                // Filter and Sort Client-Side

            state.unsubs.push(unsub);
        };

        window.deleteT = async (id) => { 
            if(confirm("Purge lobby?")) { 
                try { 
                    await deleteDoc(doc(db,"tournaments",id)); 
                    UI.toast("Deleted"); 
                } catch(e) {} 
            } 
        };

        // --- WALLET MODALS ---
        window.showTopup = () => { 
            UI.modal(`
                <h3 class="mb-4"><i class="ph-bold ph-lightning"></i> Add Funds</h3>
                <div class="glass text-center p-4 mt-2" style="background:rgba(255,255,255,0.02);">
                    <img id="r-qr" src="" style="width:200px; border-radius:16px; border:2px solid var(--primary); margin-bottom:15px;">
                    <div style="font-weight:800; color:var(--primary); font-family:monospace; font-size:1.2rem;">${state.upiId}</div>
                </div>
                <div class="form-group mt-4 mb-3">
                    <label>Amount (₹)</label>
                    <input type="number" id="r-amt" value="100" min="10" style="font-size:1.5rem; font-weight:800;" oninput="document.getElementById('r-qr').src='https://api.qrserver.com/v1/create-qr-code/?size=250x250&color=8b5cf6&bgcolor=09090b&data='+encodeURIComponent('upi://pay?pa=${state.upiId}&pn=Nexus&am='+this.value)">
                </div>
                <div class="form-group mb-4">
                    <label>12-Digit UTR / Reference No.</label>
                    <input type="text" id="r-utr" required placeholder="e.g. 123456789012" style="font-family:monospace;">
                </div>
                <button class="btn btn-primary w-100" style="padding:16px;" onclick="const a=parseInt(document.getElementById('r-amt').value),u=document.getElementById('r-utr').value; if(a>=10&&u.length>=8){addDoc(collection(db,'recharges'),{userId:state.user.uid,username:state.userData.username,amount:a,utr:u,status:'pending',createdAt:new Date().toISOString()}); UI.toast('Sent!'); UI.closeModal();}">Submit Top-up</button>
            `); 
            document.getElementById('r-amt').dispatchEvent(new Event('input')); 
        };

        window.showWithdraw = () => { 
            UI.modal(`
                <h3 class="mb-4"><i class="ph-bold ph-bank"></i> Withdraw</h3>
                <p class="text-muted mb-4">Available Balance: <strong style="color:var(--success)">₹${state.userData.wallet.coins}</strong></p>
                <div class="form-group mb-3">
                    <label>Amount (Min ₹50)</label>
                    <input type="number" id="w-amt" min="50" max="${state.userData.wallet.coins}" value="50" style="font-size:1.5rem; font-weight:800;">
                </div>
                <div class="form-group mb-4">
                    <label>UPI ID</label>
                    <input type="text" id="w-upi" required placeholder="name@bank">
                </div>
                <button class="btn btn-primary w-100" style="padding:16px;" onclick="const a=parseInt(document.getElementById('w-amt').value),u=document.getElementById('w-upi').value; if(a>=50&&a<=state.userData.wallet.coins&&u){updateDoc(doc(db,'users',state.user.uid),{'wallet.coins':increment(-a)}); addDoc(collection(db,'withdrawals'),{userId:state.user.uid,username:state.userData.username,amount:a,method:'upi',details:{upiId:u},status:'Pending',createdAt:new Date().toISOString()}); UI.toast('Requested!'); UI.closeModal();}">Authorize Payout</button>
            `); 
        };

        // --- UNIVERSAL CHAT CONTROLLER ---
        window.openChat = (targetId, type, nameOrTitle, targetName = '') => {
            let title = '', placeholder = '', col = '', qStr = '', rId = '';
            
            if(type === 'global') {
                title = `<i class="ph-bold ph-globe"></i> Lobby: ${nameOrTitle}`; 
                placeholder = "Broadcast to lobby..."; col = "chats"; qStr = "tournamentId"; rId = targetId;
            } else if (type === 'dm') {
                const combinedId = targetId > state.user.uid ? `${targetId}_${state.user.uid}` : `${state.user.uid}_${targetId}`; 
                title = `<i class="ph-bold ph-envelope"></i> DM: ${targetName}`; 
                placeholder = "Direct message..."; col = "direct_msgs"; qStr = "roomId"; rId = combinedId;
            }

            UI.modal(`
                <div class="flex-between mb-4" style="border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:15px;">
                    <h3 style="font-size:1.3rem;">${title}</h3>
                </div>
                <div class="chat-container">
                    <div class="chat-messages" id="chat-box"></div>
                    <form class="chat-input" id="chat-form">
                        <input type="text" id="chat-in" placeholder="${placeholder}" required autocomplete="off" style="flex:1; border:none; padding:15px; font-size:1rem;">
                        <button type="submit" class="btn btn-primary" style="padding:15px 25px; border-radius:10px;"><i class="ph-bold ph-paper-plane-right"></i></button>
                    </form>
                </div>
            `);

            const box = document.getElementById('chat-box');
            if(window.chatLiveUnsub) window.chatLiveUnsub(); 
            
            window.chatLiveUnsub = onSnapshot(query(collection(db, col), where(qStr, "==", rId)), snap => {
                let msgs = []; 
                snap.forEach(d => msgs.push(d.data())); 
                msgs.sort((a,b) => a.ts - b.ts);
                
                if(msgs.length === 0) {
                    box.innerHTML = `<div class="text-center text-muted mt-4 p-4"><i class="ph-duotone ph-chats" style="font-size:3rem; opacity:0.3; margin-bottom:10px;"></i><br>Secure channel open.</div>`;
                } else {
                    let h = ''; 
                    msgs.forEach(m => {
                        const isM = m.senderId === state.user.uid;
                        h += `
                            <div class="chat-msg ${isM?'mine':''}">
                                <div class="content">
                                    <div class="author">${m.sender}</div>
                                    <div>${UI.esc(m.text)}</div>
                                </div>
                            </div>
                        `;
                    }); 
                    box.innerHTML = h; 
                    box.scrollTop = box.scrollHeight;
                }
            });

            document.getElementById('chat-form').onsubmit = async(e) => { 
                e.preventDefault(); 
                const i = document.getElementById('chat-in'); 
                const txt = i.value.trim(); 
                if(!txt) return;
                try {
                    const data = { sender: state.userData.username, senderId: state.user.uid, text: txt, ts: Date.now() };
                    data[qStr] = rId;
                    await addDoc(collection(db, col), data); 
                    i.value = '';
                } catch(err) {}
            };
        };

        // --- TICKETS SYSTEM ---
        const bindTicketsView = (c) => {
            c.innerHTML = `
                <div class="flex-between mb-4">
                    <h2><i class="ph-fill ph-lifebuoy"></i> Support Center</h2>
                    <button class="btn btn-primary" onclick="createTicketUI()"><i class="ph-bold ph-plus"></i> New Ticket</button>
                </div>
                <div id="ticket-list" class="grid-cards mt-4"></div>
            `;
            
            const q = query(collection(db, "tickets"), where("userId", "==", state.user.uid));
            const unsub = onSnapshot(q, snap => {
                const tc = document.getElementById('ticket-list'); 
                if(!tc) return;
                
                let tickets = [];
                snap.forEach(d => tickets.push({id: d.id, ...d.data()}));
                tickets.sort((a,b) => b.updatedAt - a.updatedAt);
                
                let html = '';
                tickets.forEach(t => {
                    html += `
                        <div class="glass card" onclick="openTicket('${t.id}', '${UI.esc(t.subject)}', '${t.status}')" style="cursor:pointer; border-left:4px solid ${t.status==='Open'?'var(--secondary)':'var(--success)'};">
                            <div class="flex-between mb-3">
                                <span class="badge" style="background:rgba(255,255,255,0.05);">${t.category}</span> 
                                <span class="badge ${t.status==='Open'?'badge-live':'badge-success'}">${t.status}</span>
                            </div>
                            <h4 style="font-size:1.3rem; margin-bottom:10px;">${UI.esc(t.subject)}</h4>
                            <div class="text-muted" style="font-size:0.85rem;"><i class="ph-fill ph-clock"></i> Updated: ${UI.timeAgo(t.updatedAt)}</div>
                        </div>
                    `;
                }); 
                
                tc.innerHTML = html || `<div class="p-4 text-center text-muted" style="grid-column:1/-1; padding:60px; background:rgba(0,0,0,0.3); border-radius:20px;">No active support tickets.</div>`;
            }); 
            state.unsubs.push(unsub);
        };

        window.createTicketUI = () => {
            UI.modal(`
                <h3 class="mb-4"><i class="ph-bold ph-lifebuoy" style="color:var(--secondary)"></i> Generate Support Ticket</h3>
                <form id="f-ticket">
                    <div class="form-group mb-3">
                        <label>Issue Category</label>
                        <select id="tk-cat">
                            <option>Payment/Escrow Issue</option>
                            <option>Match Verification Dispute</option>
                            <option>Report Malicious Host/Player</option>
                            <option>System Bug</option>
                        </select>
                    </div>
                    <div class="form-group mb-3">
                        <label>Subject / Match ID</label>
                        <input type="text" id="tk-sub" placeholder="e.g. Scrim #123 Payout Not Received" required>
                    </div>
                    <div class="form-group mb-4">
                        <label>Detailed Report</label>
                        <textarea id="tk-msg" rows="5" placeholder="Provide as much detail as possible..." required></textarea>
                    </div>
                    <button class="btn btn-primary w-100" style="padding:16px;" type="submit">Submit to Admin Queue</button>
                </form>
            `);
            document.getElementById('f-ticket').onsubmit = async(e) => {
                e.preventDefault();
                try {
                    const ref = await addDoc(collection(db, "tickets"), { userId: state.user.uid, username: state.userData.username, category: document.getElementById('tk-cat').value, subject: document.getElementById('tk-sub').value, status: 'Open', createdAt: Date.now(), updatedAt: Date.now() });
                    await addDoc(collection(db, "ticket_msgs"), { ticketId: ref.id, sender: state.userData.username, senderId: state.user.uid, text: document.getElementById('tk-msg').value, ts: Date.now() });
                    UI.toast("Ticket Transmitted"); 
                    UI.closeModal();
                } catch(err) {}
            };
        };

        window.openTicket = (tId, sub, stat) => {
            UI.modal(`
                <div class="flex-between mb-4" style="border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:15px;">
                    <h3 style="font-size:1.3rem;"><i class="ph-bold ph-lifebuoy" style="color:var(--secondary);"></i> ${sub}</h3>
                </div>
                <div class="chat-container">
                    <div class="chat-messages" id="t-chat-box"></div>
                    ${stat==='Open' ? `
                    <form class="chat-input" id="t-chat-form">
                        <input type="text" id="t-chat-in" placeholder="Transmit reply..." required autocomplete="off" style="flex:1; border:none; padding:15px;">
                        <button type="submit" class="btn btn-primary" style="padding:15px 25px; border-radius:10px;"><i class="ph-bold ph-paper-plane-right"></i></button>
                    </form>` : `<div class="p-4 text-center text-muted" style="background:rgba(0,0,0,0.8); border-top:1px solid var(--border); font-weight:700;"><i class="ph-bold ph-lock-key"></i> INCIDENT CLOSED</div>`}
                </div>
            `);
            const box = document.getElementById('t-chat-box');
            if(window.chatLiveUnsub) window.chatLiveUnsub();
            
            window.chatLiveUnsub = onSnapshot(query(collection(db, "ticket_msgs"), where("ticketId", "==", tId)), snap => {
                let msgs = []; 
                snap.forEach(d => msgs.push(d.data())); 
                msgs.sort((a,b) => a.ts - b.ts);
                
                let h = ''; 
                msgs.forEach(m => { 
                    const isM = m.senderId === state.user.uid; 
                    h += `
                        <div class="chat-msg ${isM?'mine':''}">
                            <div class="content">
                                <div class="author">${m.sender}</div>
                                <div>${UI.esc(m.text)}</div>
                            </div>
                        </div>
                    `; 
                });
                box.innerHTML = h; 
                box.scrollTop = box.scrollHeight;
            });
            
            const f = document.getElementById('t-chat-form'); 
            if(f) f.onsubmit = async(e) => { 
                e.preventDefault(); 
                const i = document.getElementById('t-chat-in'); 
                const txt = i.value.trim(); 
                if(!txt) return;
                try { 
                    await addDoc(collection(db, "ticket_msgs"), { ticketId: tId, sender: state.userData.username, senderId: state.user.uid, text: txt, ts: Date.now() }); 
                    await updateDoc(doc(db,"tickets",tId), {updatedAt: Date.now()}); 
                    i.value = ''; 
                } catch(err) {}
            };
        };

        // --- WALLET LEDGER ---
        const bindLedger = (id) => {
            const unsub1 = onSnapshot(query(collection(db, "recharges"), where("userId", "==", state.user.uid)), s1 => {
                const unsub2 = onSnapshot(query(collection(db, "withdrawals"), where("userId", "==", state.user.uid)), s2 => {
                    const c = document.getElementById(id); 
                    if(!c) return;
                    
                    let h = []; 
                    s1.forEach(d=>{let k=d.data(); h.push({t:'Top-up', d:k.createdAt, a:k.amount, s:k.status})});
                    s2.forEach(d=>{let k=d.data(); h.push({t:'Withdrawal', d:k.createdAt, a:-k.amount, s:k.status})});
                    h.sort((a,b)=>new Date(b.d) - new Date(a.d));
                    
                    if(h.length===0){
                        c.innerHTML=`<div class="p-4 text-center text-muted" style="padding:60px;"><i class="ph-duotone ph-receipt" style="font-size:4rem; opacity:0.3; margin-bottom:15px;"></i><br>No financial records found.</div>`; 
                        return;
                    }
                    
                    let tbl = '<table><tr><th>Date</th><th>Action</th><th>Amount</th><th>Status</th></tr>';
                    h.forEach(r => { 
                        let col = r.s.toLowerCase()==='approved'||r.s.toLowerCase()==='paid'?'var(--success)':(r.s.toLowerCase()==='rejected'?'var(--danger)':'var(--warning)');
                        tbl += `
                            <tr>
                                <td style="color:var(--text-muted);">${new Date(r.d).toLocaleString()}</td>
                                <td style="font-weight:700;">${r.t}</td>
                                <td style="color:${r.a>0?'var(--success)':'white'}; font-weight:800; font-size:1.1rem;">${r.a>0?'+':''}₹${Math.abs(r.a)}</td>
                                <td><span class="badge" style="color:${col}; border-color:${col}; background:transparent;">${r.s}</span></td>
                            </tr>
                        `;
                    }); 
                    c.innerHTML = tbl+'</table>';
                }); 
                state.unsubs.push(unsub2);
            }); 
            state.unsubs.push(unsub1);
        };

        // --- INIT APP ---
        document.addEventListener('DOMContentLoaded', () => navigate('landing'));

    </script>
</body>
</html>
