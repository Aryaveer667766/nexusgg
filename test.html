<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Core | Premium Esports</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            /* Cyberpunk / Premium Dark Theme Palette */
            --bg-base: #050505;
            --bg-grid: rgba(255, 255, 255, 0.02);
            --surface: rgba(18, 18, 23, 0.75);
            --surface-hover: rgba(28, 28, 35, 0.95);
            --primary: #8b5cf6; /* Vibrant Violet */
            --primary-glow: rgba(139, 92, 246, 0.5);
            --secondary: #06b6d4; /* Cyan */
            --accent: #ec4899; /* Pink */
            --danger: #f43f5e;
            --success: #10b981;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            
            --font-display: 'Rajdhani', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            --glass-blur: blur(24px);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: var(--font-body); 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            line-height: 1.6; 
            overflow-x: hidden; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            /* Subtle Animated Grid */
            background-image: 
                linear-gradient(var(--bg-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center top;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Ambient Orbs */
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: float 20s infinite alternate; }
        .orb-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--primary); }
        .orb-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: var(--secondary); animation-delay: -5s; }
        .orb-3 { top: 30%; left: 40%; width: 40vw; height: 40vw; background: var(--accent); animation-delay: -10s; opacity: 0.15; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(5%, 10%) scale(1.1); } }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 var(--primary-glow); } 70% { transform: scale(1.02); box-shadow: 0 0 15px 10px rgba(139,92,246,0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(139,92,246,0); } }

        .glass { background: var(--surface); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }

        /* Buttons & Inputs */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 28px; font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; border-radius: 12px; border: none; cursor: pointer; transition: var(--transition); text-decoration: none; position: relative; overflow: hidden; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #6d28d9); color: white; box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(139,92,246,0.7); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-outline { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.15); color: var(--text-main); }
        .btn-outline:hover:not(:disabled) { background: rgba(255,255,255,0.08); border-color: var(--primary); color: white; }
        .btn-danger { background: rgba(244, 63, 94, 0.1); border: 1px solid var(--danger); color: var(--danger); }
        .btn-success { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); color: var(--success); }

        input, select, textarea { width: 100%; padding: 16px 20px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 12px; color: white; font-family: var(--font-body); transition: var(--transition); font-size: 1.05rem; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.6); box-shadow: 0 0 0 4px rgba(139,92,246,0.2); }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.3); }

        /* Badges & PFPs */
        .badge { padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; display: inline-flex; align-items: center; gap: 6px; }
        .badge-live { background: rgba(244, 63, 94, 0.15); color: var(--danger); border: 1px solid var(--danger); animation: pulse 2s infinite; }
        .badge-upcoming { background: rgba(6, 182, 212, 0.15); color: var(--secondary); border: 1px solid var(--secondary); }
        .badge-admin { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid var(--warning); }
        .badge-game { background: rgba(139, 92, 246, 0.15); color: #ddd6fe; border: 1px solid var(--primary); }
        
        .pfp { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; border: 2px solid var(--primary); background: var(--surface); }
        .pfp-lg { width: 90px; height: 90px; border-radius: 24px; border-width: 3px; box-shadow: 0 10px 25px var(--primary-glow); }

        /* Navigations */
        nav.top-nav { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-family: var(--font-display); font-size: 2rem; font-weight: 800; color: white; display: flex; align-items: center; gap: 10px; cursor: pointer; letter-spacing: 1px; }
        .logo i { color: var(--primary); font-size: 2.5rem; filter: drop-shadow(0 0 10px var(--primary-glow)); }
        
        .nav-actions { display: flex; align-items: center; gap: 20px; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-muted); border-radius: 12px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; transition: var(--transition); position: relative; }
        .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; border-color: var(--primary); }
        .icon-btn .dot { position: absolute; top: -2px; right: -2px; width: 12px; height: 12px; background: var(--danger); border-radius: 50%; border: 2px solid var(--bg-base); display: none; }

        .bottom-nav { display: none; position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(24px); border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .bottom-nav-inner { display: flex; justify-content: space-around; padding: 8px 5px; }
        .b-nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-muted); font-size: 0.75rem; font-weight: 600; cursor: pointer; padding: 10px; border-radius: 16px; transition: var(--transition); flex: 1; }
        .b-nav-item i { font-size: 1.6rem; transition: var(--transition); }
        .b-nav-item.active { color: var(--primary); background: rgba(139, 92, 246, 0.1); }
        .b-nav-item.active i { transform: translateY(-3px); filter: drop-shadow(0 0 8px var(--primary-glow)); }

        /* Layouts */
        #app-content { margin-top: 85px; padding: 30px 5%; flex-grow: 1; animation: fadeSlideUp 0.5s ease-out; max-width: 1600px; margin-left: auto; margin-right: auto; width: 100%; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeSlideUp 0.4s ease-out; }

        .dashboard-layout { display: grid; grid-template-columns: 280px 1fr; gap: 40px; }
        .sidebar { padding: 25px 20px; display: flex; flex-direction: column; gap: 10px; height: calc(100vh - 120px); position: sticky; top: 100px; border-radius: 24px; }
        .sidebar-item { padding: 16px 20px; border-radius: 16px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 15px; color: var(--text-muted); font-weight: 600; font-size: 1.05rem;}
        .sidebar-item:hover { background: rgba(255,255,255,0.03); color: white; }
        .sidebar-item.active { background: linear-gradient(90deg, rgba(139, 92, 246, 0.2), transparent); color: white; border-left: 4px solid var(--primary); }
        .sidebar-item i { font-size: 1.5rem; color: var(--primary); }

        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card { padding: 28px; transition: var(--transition); display: flex; flex-direction: column; gap: 16px; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px rgba(0,0,0,0.6); border-color: rgba(139, 92, 246, 0.3); background: var(--surface-hover); }
        
        .stat-box { text-align: center; padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.2) 100%); transition: var(--transition); }
        .stat-box:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .stat-value { font-family: var(--font-display); font-size: 3.5rem; font-weight: 800; color: white; margin: 10px 0; line-height: 1; text-shadow: 0 0 30px rgba(255,255,255,0.1); }
        .stat-label { color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Typography */
        h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 700; line-height: 1.2; }
        h2 { font-size: 2.2rem; display: flex; align-items: center; gap: 12px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }

        /* Modals & Toasts */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; animation: fadeSlideUp 0.3s; }
        .modal-content { width: 100%; max-width: 650px; padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); }
        .close-modal { position: absolute; top: 25px; right: 25px; cursor: pointer; color: var(--text-muted); font-size: 2rem; transition: var(--transition); background: rgba(255,255,255,0.05); border-radius: 50%; padding: 6px; }
        .close-modal:hover { color: white; background: var(--danger); transform: rotate(90deg) scale(1.1); }

        #toast-container { position: fixed; top: 25px; right: 25px; z-index: 9999; display: flex; flex-direction: column; gap: 15px; pointer-events: none; }
        .toast { padding: 18px 24px; border-radius: 16px; color: white; display: flex; align-items: center; gap: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); animation: fadeSlideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: 600; pointer-events: auto; background: rgba(15,15,20,0.98); border-left: 6px solid; font-size: 1.05rem; }

        /* Tables & Chat */
        .table-container { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        th, td { padding: 20px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.03); }
        th { background: rgba(255,255,255,0.02); color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.8rem; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        .chat-container { height: 500px; display: flex; flex-direction: column; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .chat-msg { padding: 16px 20px; border-radius: 20px 20px 20px 4px; background: rgba(255,255,255,0.05); max-width: 80%; align-self: flex-start; line-height: 1.5; font-size: 1rem; display: flex; gap: 15px; position: relative; border: 1px solid transparent; }
        .chat-msg.mine { background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(139,92,246,0.05)); border: 1px solid rgba(139,92,246,0.3); align-self: flex-end; border-radius: 20px 20px 4px 20px; flex-direction: row-reverse; }
        .chat-msg .content { display: flex; flex-direction: column; }
        .chat-msg .author { font-size: 0.8rem; color: var(--secondary); margin-bottom: 6px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .chat-msg.mine .author { text-align: right; color: var(--primary); }
        .chat-input { display: flex; padding: 20px; background: rgba(0,0,0,0.8); border-top: 1px solid var(--border); gap: 15px; align-items: center; }
        .chat-input input { border-radius: 12px; background: rgba(255,255,255,0.05); }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .dashboard-layout { grid-template-columns: 1fr; gap: 20px; }
            .sidebar { display: none; }
            .bottom-nav { display: block; }
            #app-content { margin-bottom: 90px; padding: 20px 15px; margin-top: 70px; }
            .modal-content { max-height: 90vh; padding: 25px 20px; width: 95%; border-radius: 24px; }
            .hero h1 { font-size: 3.2rem; }
            .stat-value { font-size: 2.5rem; }
            .btn { padding: 12px 20px; font-size: 1rem; }
            nav.top-nav { padding: 12px 15px; }
            .logo { font-size: 1.5rem; }
        }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .mt-2 { margin-top: 1rem; } .mt-3 { margin-top: 1.5rem; } .mt-4 { margin-top: 2rem; } .mb-2 { margin-bottom: 1rem; } .mb-3 { margin-bottom: 1.5rem; } .mb-4 { margin-bottom: 2rem; } 
        .text-center { text-align: center; }
        .w-100 { width: 100%; }
        .text-muted { color: var(--text-muted); }
        
        .banned-screen { position: fixed; top:0; left:0; width:100vw; height:100vh; background: var(--bg-base); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }

        /* Notification Dropdown */
        .notif-dropdown { position: absolute; top: 60px; right: 5%; width: 350px; max-width: 90vw; background: var(--surface-hover); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); display: none; z-index: 1001; overflow: hidden; }
        .notif-dropdown.active { display: block; animation: fadeSlideUp 0.2s ease-out; }
        .notif-header { padding: 15px 20px; border-bottom: 1px solid var(--border); font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .notif-body { max-height: 300px; overflow-y: auto; }
        .notif-item { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.02); display: flex; gap: 15px; align-items: flex-start; transition: var(--transition); cursor: pointer; }
        .notif-item:hover { background: rgba(255,255,255,0.05); }
        .notif-item i { font-size: 1.5rem; color: var(--primary); margin-top: 2px; }

    </style>
</head>
<body>

    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav class="top-nav">
        <div class="logo" onclick="navigate('landing')">
            <i class="ph-fill ph-hexagon"></i> NEXUS<span style="color:var(--primary)">CORE</span>
        </div>
        <div class="nav-actions" id="nav-desktop-actions"></div>
    </nav>

    <!-- Notifications Dropdown -->
    <div class="notif-dropdown" id="notif-menu">
        <div class="notif-header">
            Notifications <span class="badge" style="background:var(--primary); color:white;">New</span>
        </div>
        <div class="notif-body" id="notif-list">
            <div class="p-4 text-center text-muted">No new notifications</div>
        </div>
    </div>

    <div id="mobile-bottom-nav" class="bottom-nav"></div>

    <div id="toast-container"></div>
    <div id="modal-container" class="modal-overlay">
        <div class="glass modal-content" id="modal-body"></div>
    </div>

    <main id="app-content">
        <!-- Landing View -->
        <section id="view-landing" class="view-section active">
            <div style="text-align:center; padding: 80px 0 60px 0; max-width: 900px; margin: 0 auto;">

                <h1 style="font-family:var(--font-display); font-size:clamp(3.5rem, 8vw, 6.5rem); line-height:1; margin-bottom:25px; text-transform:uppercase; letter-spacing: -1px;">Dominate The <br><span style="color:var(--primary); text-shadow: 0 0 40px var(--primary-glow);">Arena</span></h1>
                <p style="font-size:1.25rem; color:var(--text-muted); margin-bottom:40px; max-width: 600px; margin-left: auto; margin-right: auto;">Compete in automated, escrow-secured tournaments. Verified hosts, zero-delay payouts, and instant support.</p>
                <div style="display:flex; gap:20px; justify-content:center; flex-wrap:wrap;">
                    <button class="btn btn-primary" onclick="navigate('register')"><i class="ph-bold ph-sword"></i> Start Competing</button>
                    <button class="btn btn-outline" onclick="navigate('login')">Login / Host</button>
                </div>
            </div>
            
            <div class="mt-4">
                <h2><i class="ph-fill ph-fire" style="color:var(--danger)"></i> Live & Upcoming Scrims</h2>
                <div class="grid-cards" id="landing-tournaments-list">
                    <div class="glass p-4 text-center text-muted"><i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--primary); margin-bottom:15px;"></i><br>Syncing Nexus Core...</div>
                </div>
            </div>
        </section>

        <!-- Auth View -->
        <section id="view-auth" class="view-section">
            <div class="glass" id="auth-box" style="max-width: 480px; margin: 60px auto; padding: 50px;"></div>
        </section>

        <!-- Player Dashboard -->
        <section id="view-player-dash" class="view-section">
            <div class="dashboard-layout">
                <div class="glass sidebar" id="player-sidebar"></div>
                <div id="player-dash-content"></div>
            </div>
        </section>

        <!-- Host Dashboard -->
        <section id="view-host-dash" class="view-section">
            <div class="dashboard-layout">
                <div class="glass sidebar" id="host-sidebar"></div>
                <div id="host-dash-content"></div>
            </div>
        </section>

            <div class="dashboard-layout">
                <div class="glass sidebar" id="admin-sidebar"></div>
                <div id="admin-dash-content"></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ_c3EaDxSZ6RrNrwQjR_TauJHrPfk_lk",
            authDomain: "designsnap-f3309.firebaseapp.com",
            databaseURL: "https://designsnap-f3309-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "designsnap-f3309",
            storageBucket: "designsnap-f3309.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Core App State
        let state = {
            user: null, userData: null, currentView: 'landing', activeTab: 'overview',
            upiId: "nexuscore@okaxis", platformFee: 0.10,
            unsubs: [] 
        };

        // Game Configuration Dictionary for Dynamic Forms
        const GAME_CONFIG = {
            "BGMI": { modes: ["Solo", "Duo", "Squad"], maps: ["Erangel", "Miramar", "Sanhok", "Livik"] },
            "Free Fire": { modes: ["Solo", "Duo", "Squad", "Clash Squad"], maps: ["Bermuda", "Purgatory", "Kalahari", "Alpine"] },
            "Among Us": { modes: ["Standard", "Hide & Seek"], maps: ["The Skeld", "Polus", "Airship", "MIRA HQ"], extra: "Impostor Count / Rules" },
            "Valorant": { modes: ["Standard 5v5", "Swiftplay", "Deathmatch"], maps: ["Bind", "Haven", "Ascent", "Split", "Lotus"] },
            "CODM": { modes: ["BR Squad", "BR Solo", "MP 5v5"], maps: ["Isolated", "Blackout", "Nuketown"] }
        };

        // Utility Functions
        const UI = {
            toast: (msg, type = 'success') => {
                const c = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = `toast ${type}`;
                t.style.borderLeftColor = type === 'success' ? 'var(--success)' : 'var(--danger)';
                t.innerHTML = `<i class="ph-fill ${type === 'success' ? 'ph-check-circle' : 'ph-warning-octagon'}" style="font-size:1.8rem; color:${type === 'success' ? 'var(--success)' : 'var(--danger)'}"></i> <span style="flex:1;">${msg}</span>`;
                c.appendChild(t);
                setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 4000);
            },
            modal: (html) => {

        // --- DASHBOARD ROUTING ENGINE ---

        };

        window.viewTDetails = async (id) => {

        window.joinT = async (tId, fee) => {

        const bindMyMatches = async () => {

                                    <button class="btn btn-outline" style="padding:10px; font-size:0.9rem; border-color:rgba(255,255,255,0.1);" onclick="openChat('${tDoc.id}', 'global', '${UI.esc(t.title)}')"><i class="ph-fill ph-globe"></i> Lobby Chat</button>
                                    <button class="btn btn-outline" style="padding:10px; font-size:0.9rem; border-color:var(--primary); color:white;" onclick="openChat('${tDoc.id}', 'dm', '${t.hostId}', '${UI.esc(t.hostName)}')"><i class="ph-fill ph-envelope"></i> Message Host</button>

                document.getElementById('f-create').onsubmit = async(e) => {

                    try {

            window.chatLiveUnsub = onSnapshot(query(collection(db, "ticket_msgs"), where("ticketId", "==", tId)), snap => {
                let msgs = []; snap.forEach(d => msgs.push(d.data())); msgs.sort((a,b)=>a.ts - b.ts);
                let h = ''; msgs.forEach(m => { const isM = m.senderId === state.user.uid; h += `<div class="chat-msg ${isM?'mine':''}"><div class="content"><div class="author">${m.sender} ${isAdmin&&!isM?'<span style="color:var(--text-muted)">(User)</span>':'<span style="color:var(--danger)">(Admin)</span>'}</div><div>${UI.esc(m.text)}</div></div></div>`; });
                box.innerHTML = h; box.scrollTop = box.scrollHeight;
            });
            const f = document.getElementById('t-chat-form'); if(f) f.onsubmit = async(e) => { e.preventDefault(); const i = document.getElementById('t-chat-in'); const txt = i.value.trim(); if(!txt) return;
                try { await addDoc(collection(db, "ticket_msgs"), { ticketId: tId, sender: state.userData.username, senderId: state.user.uid, text: txt, ts: Date.now() }); await updateDoc(doc(db,"tickets",tId), {updatedAt:Date.now()}); i.value = ''; } catch(err){}
            };
        };
        window.closeTicket = async(id) => { try{ await updateDoc(doc(db,"tickets",id), {status:'Closed'}); UI.closeModal(); UI.toast("Incident Closed"); }catch(e){} };

        // --- WALLET UTILS ---
        const bindLedger = (id) => {
            const unsub1 = onSnapshot(query(collection(db, "recharges"), where("userId", "==", state.user.uid)), s1 => {
                const unsub2 = onSnapshot(query(collection(db, "withdrawals"), where("userId", "==", state.user.uid)), s2 => {
                    const c = document.getElementById(id); if(!c) return;
                    let h = []; 
                    s1.forEach(d=>{let k=d.data(); h.push({t:'Top-up', d:k.createdAt, a:k.amount, s:k.status})});
                    s2.forEach(d=>{let k=d.data(); h.push({t:'Withdrawal', d:k.createdAt, a:-k.amount, s:k.status})});
                    h.sort((a,b)=>new Date(b.d)-new Date(a.d));
                    if(h.length===0){c.innerHTML=`<div class="p-4 text-center text-muted" style="padding:60px;"><i class="ph-duotone ph-receipt" style="font-size:4rem; opacity:0.4; margin-bottom:15px;"></i><br>No financial records found.</div>`; return;}
                    let tbl = '<table><tr><th>Timestamp</th><th>Action</th><th>Amount</th><th>Network Status</th></tr>';
                    h.forEach(r => { let col = r.s.toLowerCase()==='approved'||r.s.toLowerCase()==='paid'?'var(--success)':(r.s.toLowerCase()==='rejected'?'var(--danger)':'var(--warning)');
                        tbl += `<tr><td style="color:var(--text-muted);">${new Date(r.d).toLocaleString()}</td><td style="font-weight:700;">${r.t}</td><td style="color:${r.a>0?'var(--success)':'white'}; font-weight:800; font-size:1.1rem;">${r.a>0?'+':''}₹${Math.abs(r.a)}</td><td><span class="badge" style="color:${col}; border-color:${col}; background:transparent;">${r.s}</span></td></tr>`;
                    }); c.innerHTML = tbl+'</table>';
                }); state.unsubs.push(unsub2);
            }); state.unsubs.push(unsub1);
        };

        window.showTopup = () => {
            UI.modal(`
                <h3 class="mb-4"><i class="ph-bold ph-lightning" style="color:var(--warning)"></i> Initialize Top-up</h3>
                <div class="glass text-center p-4 mt-2" style="background:rgba(255,255,255,0.02); border:1px dashed rgba(255,255,255,0.1);"><img id="r-qr" src="" style="width:200px; border-radius:16px; border:2px solid var(--primary); margin-bottom:20px; box-shadow:0 10px 30px var(--primary-glow);"><div style="font-weight:800; font-size:1.3rem; color:white; letter-spacing:1px;"><i class="ph-fill ph-scan"></i> SCAN TO PAY</div><div style="color:var(--primary); font-family:monospace; font-size:1.1rem; margin-top:5px;">${state.upiId}</div></div>
                <div class="form-group mt-4 mb-3"><label class="text-muted" style="font-weight:700; font-size:0.85rem;">AMOUNT (₹)</label><input type="number" id="r-amt" value="100" min="10" style="font-size:1.5rem; font-weight:800;" oninput="document.getElementById('r-qr').src='https://api.qrserver.com/v1/create-qr-code/?size=250x250&color=8b5cf6&bgcolor=050505&data='+encodeURIComponent('upi://pay?pa=${state.upiId}&pn=Nexus&am='+this.value)"></div>
                <div class="form-group mb-4"><label class="text-muted" style="font-weight:700; font-size:0.85rem;">12-DIGIT UTR / REFERENCE NO.</label><input type="text" id="r-utr" required placeholder="e.g. 123456789012" style="font-family:monospace;"></div>
                <button class="btn btn-primary w-100" style="padding:16px; font-size:1.1rem;" onclick="subR()">Transmit Request to Core</button>
            `); document.getElementById('r-amt').dispatchEvent(new Event('input'));
        };
        window.subR = async () => { const a=parseInt(document.getElementById('r-amt').value), u=document.getElementById('r-utr').value; if(a>=10&&u.length>=8){try{await addDoc(collection(db,"recharges"),{userId:state.user.uid, username:state.userData.username, amount:a, utr:u, status:'pending', createdAt:new Date().toISOString()}); UI.toast("Request Transmitted!"); UI.closeModal();}catch(e){}}};

        window.showWithdraw = () => {
            UI.modal(`
                <h3 class="mb-4"><i class="ph-bold ph-bank" style="color:var(--success)"></i> Escrow Withdrawal</h3>
                <p class="text-muted mt-2 mb-4" style="line-height:1.6; font-size:1.05rem;">Cleared Escrow Balance: <strong style="color:var(--success); font-size:1.2rem;">₹${state.userData.wallet.coins}</strong><br>Manual security sweeps are performed before payout authorization.</p>
                <div class="form-group mb-3"><label class="text-muted" style="font-weight:700; font-size:0.85rem;">AMOUNT TO WITHDRAW (MIN ₹50)</label><input type="number" id="w-amt" min="50" max="${state.userData.wallet.coins}" value="50" style="font-size:1.5rem; font-weight:800; color:var(--success);"></div>
                <div class="form-group mb-4"><label class="text-muted" style="font-weight:700; font-size:0.85rem;">DESTINATION UPI ID</label><input type="text" id="w-upi" required placeholder="name@bank"></div>
                <button class="btn btn-primary w-100 mt-2" style="padding:16px; font-size:1.1rem; box-shadow:0 10px 30px rgba(16,185,129,0.3); background:linear-gradient(135deg, var(--success), #047857);" onclick="subW()">Authorize Payout Transfer</button>
            `);
        };
        window.subW = async () => { const a=parseInt(document.getElementById('w-amt').value), u=document.getElementById('w-upi').value; if(a>=50&&a<=state.userData.wallet.coins&&u){try{await updateDoc(doc(db,"users",state.user.uid),{"wallet.coins":increment(-a)}); await addDoc(collection(db,"withdrawals"),{userId:state.user.uid, username:state.userData.username, amount:a, method:'upi', details:{upiId:u}, status:'Pending', createdAt:new Date().toISOString()}); UI.toast("Payout Authorized. Awaiting Sweep."); UI.closeModal();}catch(e){}}};

        // Init App
        document.addEventListener('DOMContentLoaded', () => navigate('landing'));
    </script>
</body>
</html>
