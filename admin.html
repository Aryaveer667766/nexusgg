<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus | System Core (Admin)</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            /* Deep Night Esports Theme - Admin Specific (Amber/Gold & Crimson) */
            --bg-base: #050303;
            --surface: rgba(20, 15, 15, 0.65);
            --surface-hover: rgba(40, 30, 30, 0.8);
            
            --primary: #f59e0b; /* Neon Amber / Gold for Admin */
            --primary-glow: rgba(245, 158, 11, 0.4);
            
            --accent: #e11d48; /* Crimson */
            --danger: #ef4444;
            --success: #10b981;
            
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            
            --font-display: 'Rajdhani', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            --shadow-float: 0 20px 40px -10px rgba(0,0,0,0.8);
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font-body);
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(225, 29, 72, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(245, 158, 11, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 28px; font-family: var(--font-display); font-size: 1.1rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            border-radius: 8px; border: none; cursor: pointer; transition: var(--transition);
            position: relative; overflow: hidden;
        }
        .btn:active { transform: scale(0.96); }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), #d97706); 
            color: #000; 
            box-shadow: 0 0 15px var(--primary-glow); 
        }
        .btn-primary:hover:not(:disabled) { 
            box-shadow: 0 0 25px var(--primary-glow);
            transform: translateY(-2px);
            filter: brightness(1.2);
        }
        
        .btn-outline { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--text-main); 
        }
        .btn-outline:hover:not(:disabled) { 
            border-color: var(--primary); 
            color: var(--primary);
            background: rgba(245, 158, 11, 0.05);
            transform: translateY(-2px); 
        }
        
        .btn-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);}

        input, select, textarea {
            width: 100%; padding: 14px 18px; 
            background: rgba(0,0,0,0.4); 
            border: 1px solid var(--border);
            border-radius: 8px; color: white; 
            font-family: var(--font-body); transition: var(--transition);
            font-size: 0.95rem;
        }
        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: rgba(245, 158, 11, 0.02);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1); 
        }

        .badge {
            padding: 6px 14px; border-radius: 6px; font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; display: inline-flex; align-items: center; gap: 6px;
        }

        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000; padding: 16px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); 
            background: rgba(5, 3, 3, 0.8);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-text { font-family: var(--font-display); font-size: 2rem; font-weight: 800; color: white; letter-spacing: 1px; }

        #app-content { margin-top: 85px; padding: 20px 5%; min-height: calc(100vh - 85px); padding-bottom: 100px; max-width: 1400px; margin-left: auto; margin-right: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .dashboard-layout { display: grid; grid-template-columns: 280px 1fr; gap: 40px; }
        .sidebar { padding: 24px; display: flex; flex-direction: column; gap: 8px; position: sticky; top: 110px; height: max-content; }
        .sidebar-item { padding: 14px 20px; border-radius: 8px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 14px; color: var(--text-muted); font-weight: 500; font-size: 1.05rem;}
        .sidebar-item:hover { background: rgba(255,255,255,0.03); color: white; }
        .sidebar-item.active { background: rgba(245, 158, 11, 0.1); color: var(--primary); box-shadow: inset 3px 0 0 var(--primary); }
        
        .bottom-nav { display: none; }

        @media (max-width: 900px) {
            .dashboard-layout { grid-template-columns: 1fr; gap: 20px; }
            .sidebar { display: none; }
            .bottom-nav {
                display: flex; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 999;
                background: rgba(8, 5, 5, 0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border);
                padding: 12px 5px; padding-bottom: env(safe-area-inset-bottom, 15px); justify-content: space-around; flex-wrap: wrap; gap: 5px;
            }
            .b-nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-muted); font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: 0.2s; width: 60px;}
            .b-nav-item i { font-size: 1.4rem; }
            .b-nav-item.active { color: var(--primary); transform: translateY(-4px); }
            #app-content { padding-bottom: 120px; }
        }

        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-top: 24px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }

        .skeleton { 
            background: var(--surface-hover); 
            background-image: linear-gradient(to right, var(--surface-hover) 0%, rgba(255,255,255,0.05) 20%, var(--surface-hover) 40%, var(--surface-hover) 100%); 
            background-repeat: no-repeat; background-size: 1000px 100%; animation: shimmer 2s infinite linear; border-radius: 8px; 
        }
        
        .empty-state { text-align: center; padding: 80px 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; color: var(--text-muted); }
        .empty-state i { font-size: 4.5rem; color: rgba(255,255,255,0.1); }

        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 18px 20px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: rgba(255,255,255,0.02); color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;}
        tr:hover { background: rgba(255,255,255,0.02); }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { pointer-events: auto; padding: 16px 24px; border-radius: 8px; color: white; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-float); animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1); background: rgba(15, 10, 10, 0.95); backdrop-filter: blur(10px); border: 1px solid var(--border); min-width: 320px; font-weight: 500;}
        .toast.success { border-left: 4px solid var(--success); }
        .toast.success i { color: var(--success); font-size: 1.6rem; }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.error i { color: var(--danger); font-size: 1.6rem; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s;}
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { width: 95%; max-width: 550px; padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; background: var(--bg-base); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 0 50px rgba(0,0,0,0.8); transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .close-modal { position: absolute; top: 24px; right: 24px; cursor: pointer; color: var(--text-muted); font-size: 1.5rem; transition: var(--transition); background: rgba(255,255,255,0.05); border-radius: 8px; padding: 6px; display: flex;}
        .close-modal:hover { color: white; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <img id="nav-logo-img" src="" style="display:none; height:32px;">
            <i id="nav-logo-icon" class="ph-fill ph-cpu" style="font-size: 32px; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow);"></i>
            <span class="logo-text brand-name" style="letter-spacing: 2px;">NEXUS <span style="font-size:1rem; color:var(--primary); font-weight:600; vertical-align:super;">CORE</span></span>
        </div>
        <div class="nav-actions" id="nav-auth-container">
            <div style="text-align:right; display:none; @media(min-width:600px){display:block;}">
                <span id="nav-username" style="color:white; font-weight:600;">System Admin</span>
            </div>
            <button class="btn btn-outline" style="border-color:var(--danger); color:var(--danger); padding: 8px; font-size: 0.9rem;" onclick="logoutUser()"><i class="ph-bold ph-power"></i></button>
        </div>
    </nav>

    <div id="toast-container"></div>
    <div id="modal-container" class="modal-overlay">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <main id="app-content">
        <!-- ADMIN DASHBOARD -->
        <section id="view-admin-dash" class="view-section active">
            <div class="dashboard-layout">
                <div class="glass sidebar">
                    <div class="sidebar-item active" data-tab="admin-overview"><i class="ph-fill ph-cpu"></i> Diagnostics</div>
                    <div class="sidebar-item" data-tab="admin-settings"><i class="ph-fill ph-gear"></i> System Config</div>
                    <div class="sidebar-item" data-tab="admin-tournaments"><i class="ph-fill ph-game-controller"></i> Global Override</div>
                    <div class="sidebar-item" data-tab="admin-settlements"><i class="ph-fill ph-scales"></i> Escrow Settlements</div>
                    <div class="sidebar-item" data-tab="admin-recharges"><i class="ph-fill ph-bank"></i> UTR Verification</div>
                    <div class="sidebar-item" data-tab="admin-withdrawals"><i class="ph-fill ph-money"></i> Payout Queue</div>
                    <div class="sidebar-item" data-tab="admin-users"><i class="ph-fill ph-users-three"></i> User Matrix</div>
                    <div class="sidebar-item" data-tab="admin-support"><i class="ph-fill ph-lifebuoy"></i> Comms Desk</div>
                </div>
                <div class="bottom-nav" id="bnav-admin">
                    <div class="b-nav-item active" data-tab="admin-overview"><i class="ph-fill ph-cpu"></i>Core</div>
                    <div class="b-nav-item" data-tab="admin-settings"><i class="ph-fill ph-gear"></i>Config</div>
                    <div class="b-nav-item" data-tab="admin-tournaments"><i class="ph-fill ph-game-controller"></i>Events</div>
                    <div class="b-nav-item" data-tab="admin-settlements"><i class="ph-fill ph-scales"></i>Escrow</div>
                    <div class="b-nav-item" data-tab="admin-recharges"><i class="ph-fill ph-bank"></i>UTR</div>
                    <div class="b-nav-item" data-tab="admin-withdrawals"><i class="ph-fill ph-money"></i>Payouts</div>
                    <div class="b-nav-item" data-tab="admin-users"><i class="ph-fill ph-users-three"></i>Users</div>
                </div>
                <div class="dashboard-content" id="admin-dash-content"></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, getDocs, query, where, updateDoc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ_c3EaDxSZ6RrNrwQjR_TauJHrPfk_lk",
            authDomain: "designsnap-f3309.firebaseapp.com",
            databaseURL: "https://designsnap-f3309-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "designsnap-f3309",
            storageBucket: "designsnap-f3309.firebasestorage.app",
            messagingSenderId: "741888249963",
            appId: "1:741888249963:web:9540c9f68d6f0d5da9a12e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let appState = {
            user: null, userData: null,
            brandName: "NEXUS", brandLogo: "", platformFeePercent: 10, withdrawalFeePercent: 5, hostCreationFee: 50
        };

        const UI = {
            showToast: (msg, type = 'success') => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `<i class="ph-fill ${type === 'success' ? 'ph-check-circle' : 'ph-warning-circle'}"></i> <span>${msg}</span>`;
                container.appendChild(toast);
                setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(40px)'; setTimeout(() => toast.remove(), 400); }, 4000);
            },
            showModal: (html) => {
                document.getElementById('modal-body').innerHTML = `<i class="ph-bold ph-x close-modal" onclick="closeModal()"></i>` + html;
                document.getElementById('modal-container').classList.add('active');
            },
            closeModal: () => document.getElementById('modal-container').classList.remove('active'),
            escapeHTML: (str) => String(str || '').replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag)),
            emptyState: (icon, title, desc) => `<div class="empty-state"><i class="ph-duotone ${icon}"></i><h3 style="font-family:var(--font-display); font-size:2rem;">${title}</h3><p>${desc}</p></div>`
        };
        window.closeModal = UI.closeModal; 

        window.logoutUser = () => {
            signOut(auth).then(() => { window.location.href = 'index.html'; });
        };

        // Load Platform Settings Sync
        onSnapshot(doc(db, "platform", "settings"), (docSnap) => {
            if(docSnap.exists()) {
                const data = docSnap.data();
                if(data.brandName) { 
                    appState.brandName = data.brandName; 
                    document.querySelectorAll('.brand-name').forEach(el => el.innerHTML = `${appState.brandName.toUpperCase()} <span style="font-size:1rem; color:var(--primary); font-weight:600; vertical-align:super;">CORE</span>`); 
                }
                if(data.platformFeePercent !== undefined) appState.platformFeePercent = parseInt(data.platformFeePercent);
                if(data.withdrawalFeePercent !== undefined) appState.withdrawalFeePercent = parseInt(data.withdrawalFeePercent);
                if(data.hostCreationFee !== undefined) appState.hostCreationFee = parseInt(data.hostCreationFee);
                if(data.brandLogo) {
                    appState.brandLogo = data.brandLogo;
                    document.getElementById('nav-logo-icon').style.display = 'none';
                    const img = document.getElementById('nav-logo-img');
                    img.src = data.brandLogo; img.style.display = 'block';
                }
            }
        });

        // CORE AUTH LOGIC: Strict Admin Lockout
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                appState.user = user;
                try {
                    let docSnap = await getDoc(doc(db, "users", user.uid));
                    if (!docSnap.exists()) { await new Promise(r => setTimeout(r, 1500)); docSnap = await getDoc(doc(db, "users", user.uid)); }
                    
                    if (docSnap.exists()) {
                        appState.userData = docSnap.data(); 
                        if (appState.userData.role !== 'admin') {
                            // Non-admins get booted immediately
                            window.location.href = 'index.html';
                            return;
                        }
                        
                        document.getElementById('nav-username').innerText = appState.userData.username;
                        renderAdminDashboard();
                    } else { window.location.href = 'index.html'; }
                } catch (e) { UI.showToast("Database Auth Blocked.", "error"); }
            } else {
                window.location.href = 'index.html';
            }
        });

        const setupSidebar = (role, callback) => {
            const sideItems = document.querySelectorAll(`#view-${role}-dash .sidebar-item`);
            const botItems = document.querySelectorAll(`#bnav-${role} .b-nav-item`);
            
            const attach = (items) => {
                items.forEach(item => {
                    const newEl = item.cloneNode(true); item.parentNode.replaceChild(newEl, item);
                    newEl.addEventListener('click', (e) => {
                        sideItems.forEach(el => el.classList.remove('active'));
                        if(botItems) botItems.forEach(el => el.classList.remove('active'));
                        
                        const tab = e.currentTarget.dataset.tab;
                        document.querySelector(`#view-${role}-dash .sidebar-item[data-tab="${tab}"]`)?.classList.add('active');
                        document.querySelector(`#bnav-${role} .b-nav-item[data-tab="${tab}"]`)?.classList.add('active');
                        
                        callback(tab);
                    });
                });
            };
            attach(sideItems); if(botItems) attach(botItems);
            
            const activeTab = document.querySelector(`#view-${role}-dash .sidebar-item.active`);
            if(activeTab) callback(activeTab.dataset.tab);
        };

        const renderAdminDashboard = () => {
            const container = document.getElementById('admin-dash-content');
            
            setupSidebar('admin', (tab) => {
                if(tab === 'admin-overview') {
                    container.innerHTML = `
                        <h2 style="font-family:var(--font-display); font-size:2.5rem; margin-bottom:24px;">God Mode Diagnostics</h2>
                        <div class="glass p-4 mt-4 text-center" style="padding:80px 20px; position:relative; overflow:hidden;">
                            <div style="position:absolute; top:-50px; left:50%; transform:translateX(-50%); width:300px; height:150px; background:var(--primary); opacity:0.05; filter:blur(60px);"></div>
                            <i class="ph-duotone ph-cpu" style="font-size:6rem; color:var(--primary); margin-bottom:20px; filter:drop-shadow(0 0 20px var(--primary-glow));"></i>
                            <h2 style="font-family:var(--font-display); font-size:3rem; letter-spacing:2px; margin:0; line-height:1;">NEXUS CORE ENGINE</h2>
                            <p style="color:var(--success); font-weight:700; letter-spacing:4px; font-size:1.1rem; margin-top:16px;"><i class="ph-fill ph-check-circle"></i> SYSTEM ONLINE</p>
                        </div>
                    `;
                } else if(tab === 'admin-settings') {
                    container.innerHTML = `
                        <h2 style="font-family:var(--font-display); font-size:2.5rem; margin-bottom:24px;">Platform Config</h2>
                        <div class="glass" style="padding:40px; max-width:700px;">
                            <div class="form-group" style="margin-bottom:24px;">
                                <label style="display:block; margin-bottom:8px; color:var(--text-muted); font-weight:500;">Platform Brand Name</label>
                                <input type="text" id="cfg-brand" value="${appState.brandName}">
                            </div>
                            
                            <div class="form-group" style="margin-bottom:32px; padding:20px; border:1px dashed var(--border); border-radius:12px; background:rgba(0,0,0,0.2);">
                                <label style="display:block; margin-bottom:12px; color:var(--text-muted); font-weight:500;">Upload Brand Logo</label>
                                <input type="file" id="cfg-logo-file" accept="image/*" style="padding:10px; border:none; background:transparent;">
                                <input type="hidden" id="cfg-logo-base64" value="${appState.brandLogo || ''}">
                                <div id="logo-preview" class="mt-2 text-center" style="background:rgba(255,255,255,0.02); padding:20px; border-radius:8px; margin-top:16px;">
                                    ${appState.brandLogo ? `<img src="${appState.brandLogo}" style="height:50px; border-radius:4px;">` : '<span style="color:var(--text-muted); font-size:0.9rem;">No logo uploaded</span>'}
                                </div>
                            </div>

                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:32px;">
                                <div class="form-group"><label style="display:block; margin-bottom:8px; color:var(--text-muted); font-weight:500;">Host Revenue Cut (%)</label><input type="number" id="cfg-host-fee" value="${appState.platformFeePercent}"></div>
                                <div class="form-group"><label style="display:block; margin-bottom:8px; color:var(--text-muted); font-weight:500;">Withdrawal Fee (%)</label><input type="number" id="cfg-withdraw-fee" value="${appState.withdrawalFeePercent}"></div>
                                <div class="form-group" style="grid-column: 1 / -1;"><label style="display:block; margin-bottom:8px; color:var(--text-muted); font-weight:500;">Event Creation Fee (₹) [Host Pays to Publish]</label><input type="number" id="cfg-create-fee" value="${appState.hostCreationFee}"></div>
                            </div>
                            
                            <button class="btn btn-primary w-100" style="width:100%; padding:14px;" onclick="saveSettings()">Deploy Configuration</button>
                        </div>
                    `;
                    
                    document.getElementById('cfg-logo-file').addEventListener('change', function(e) {
                        const file = e.target.files[0]; if(!file) return;
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            const img = new Image();
                            img.onload = function() {
                                const canvas = document.createElement('canvas');
                                const MAX_WIDTH = 250; const MAX_HEIGHT = 100;
                                let width = img.width; let height = img.height;
                                if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
                                else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                                canvas.width = width; canvas.height = height;
                                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                                const dataUrl = canvas.toDataURL('image/png');
                                document.getElementById('cfg-logo-base64').value = dataUrl;
                                document.getElementById('logo-preview').innerHTML = `<img src="${dataUrl}" style="height:50px; border-radius:4px;">`;
                            }
                            img.src = event.target.result;
                        }
                        reader.readAsDataURL(file);
                    });

                    window.saveSettings = async () => { 
                        try { 
                            let payload = { 
                                brandName: document.getElementById('cfg-brand').value, 
                                brandLogo: document.getElementById('cfg-logo-base64').value,
                                platformFeePercent: parseInt(document.getElementById('cfg-host-fee').value), 
                                withdrawalFeePercent: parseInt(document.getElementById('cfg-withdraw-fee').value),
                                hostCreationFee: parseInt(document.getElementById('cfg-create-fee').value)
                            };
                            await setDoc(doc(db, "platform", "settings"), payload, {merge: true}); 
                            UI.showToast("Settings Deployed."); 
                        } catch(e){} 
                    };
                } else if(tab === 'admin-tournaments') { 
                    container.innerHTML = `<h2 style="font-family:var(--font-display); font-size:2.5rem; margin-bottom:24px;">Global Event Override</h2><div id="admin-t-list"><div class="skeleton" style="height:250px;"></div></div>`; 
                    loadAdminTournaments();
                } else if(tab === 'admin-settlements') { 
                    container.innerHTML = `<h2 style="font-family:var(--font-display); font-size:2.5rem; margin-bottom:24px;">Escrow Queue</h2><div id="admin-s-list"><div class="skeleton" style="height:250px;"></div></div>`; 
                    loadAdminSettlements();
                } else if(tab === 'admin-recharges') { 
                    container.innerHTML = `<h2 style="font-family:var(--font-display); font-size:2.5rem; margin-bottom:24px;">UTR Verifications</h2><div id="admin-r-list"><div class="skeleton" style="height:250px;"></div></div>`; 
                    loadAdminRecharges();
                } else if(tab === 'admin-withdrawals') { 
                    container.innerHTML = `<h2 style="font-family:var(--font-display); font-size:2.5rem; margin-bottom:24px;">Payout Queue</h2><div id="admin-w-list"><div class="skeleton" style="height:250px;"></div></div>`; 
                    loadAdminWithdrawals();
                } else if(tab === 'admin-users') { 
                    container.innerHTML = `<h2 style="font-family:var(--font-display); font-size:2.5rem; margin-bottom:24px;">User Matrix</h2><div id="admin-u-list"><div class="skeleton" style="height:250px;"></div></div>`; 
                    loadAdminUsers();
                } else if(tab === 'admin-support') { 
                    container.innerHTML = `<h2 style="font-family:var(--font-display); font-size:2.5rem; margin-bottom:24px;">Admin Comms Desk</h2><div id="admin-tkt-list"><div class="skeleton" style="height:250px;"></div></div>`; 
                    loadAdminTickets(); 
                }
            });
        };
        
        // --- ADMIN FUNCTIONS ---

        const loadAdminTournaments = async () => {
            const container = document.getElementById('admin-t-list');
            try {
                const snap = await getDocs(collection(db, "tournaments"));
                let data = []; snap.forEach(d => data.push({id: d.id, ...d.data()})); data.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                
                let html = '<div class="table-responsive"><table><tr><th>Operation</th><th>Host</th><th>Prize</th><th>Slots</th><th>Actions</th></tr>';
                data.forEach(t => { 
                    html += `<tr>
                        <td style="font-weight:600; font-size:1.05rem;">${UI.escapeHTML(t.title)}<br><span class="badge mt-1" style="border:1px solid var(--border); background:rgba(0,0,0,0.3); color:var(--text-muted); font-size:0.65rem;">${t.status}</span></td>
                        <td>${UI.escapeHTML(t.hostName)}</td>
                        <td style="color:var(--success); font-weight:700;">₹${t.prizePool}</td>
                        <td style="font-weight:500;">${t.filledSlots}/${t.maxSlots}</td>
                        <td><button class="btn btn-outline" style="padding:8px 16px; font-size:0.85rem; border-color:var(--primary); color:var(--primary);" onclick="adminEditT('${t.id}')">Override</button></td>
                    </tr>`; 
                });
                container.innerHTML = html + '</table></div>';
                
                window._aTData = window._aTData || {}; data.forEach(d => window._aTData[d.id] = d);
            } catch(e) {}
        };

        window.adminEditT = (id) => {
            const t = window._aTData[id];
            UI.showModal(`
                <h3 style="font-family:var(--font-display); font-size:2.2rem; margin-bottom:24px;">Override Directive</h3>
                <div class="form-group" style="margin-bottom:16px;"><label style="display:block; margin-bottom:8px; color:var(--text-muted);">Prize Pool</label><input type="number" id="ae-prize" value="${t.prizePool}"></div>
                <div class="form-group" style="margin-bottom:16px;"><label style="display:block; margin-bottom:8px; color:var(--text-muted);">Filled Slots</label><input type="number" id="ae-slots" value="${t.filledSlots}"></div>
                <div class="form-group" style="margin-bottom:32px;"><label style="display:block; margin-bottom:8px; color:var(--text-muted);">Status</label>
                    <select id="ae-status">
                        <option value="Registration Open" ${t.status==='Registration Open'?'selected':''}>Registration Open</option>
                        <option value="Upcoming" ${t.status==='Upcoming'?'selected':''}>Upcoming</option>
                        <option value="Live" ${t.status==='Live'?'selected':''}>Live</option>
                        <option value="Cancelled" ${t.status==='Cancelled'?'selected':''}>Cancelled</option>
                    </select>
                </div>
                <button class="btn btn-primary w-100" style="width:100%; padding:14px;" onclick="aST('${id}')">Execute Override</button>
            `);
        };
        window.aST = async (id) => { 
            try { 
                await updateDoc(doc(db, "tournaments", id), { prizePool: parseInt(document.getElementById('ae-prize').value), filledSlots: parseInt(document.getElementById('ae-slots').value), status: document.getElementById('ae-status').value }); 
                UI.showToast("Override Successful."); UI.closeModal(); loadAdminTournaments(); 
            } catch(e) {} 
        };

        const loadAdminSettlements = async () => {
            const container = document.getElementById('admin-s-list');
            try {
                const snap = await getDocs(query(collection(db, "tournaments"), where("status", "==", "Pending Settlement")));
                if(snap.empty) { container.innerHTML = UI.emptyState('ph-scales', 'Escrow Clear', 'No operations pending settlement.'); return; }
                
                let html = '<div class="table-responsive"><table><tr><th>Operation</th><th>Gross / Prize</th><th>Platform/Host Split</th><th>Actions</th></tr>';
                snap.forEach(doc => {
                    const t = doc.data(); 
                    let tot = t.filledSlots * t.entryFee; 
                    let rem = tot - t.prizePool; 
                    let platformCutPercent = appState.platformFeePercent;
                    let hostCutPercent = 100 - platformCutPercent;
                    let hC = rem > 0 ? Math.floor(rem * (hostCutPercent/100)) : 0;
                    let pC = rem > 0 ? rem - hC : 0;
                    
                    html += `<tr>
                        <td style="font-weight:600; font-size:1.05rem;">${UI.escapeHTML(t.title)}<br><span style="font-size:0.75rem; color:var(--text-muted); font-weight:400;">Winner ID: ${t.winnerId}</span></td>
                        <td>Total: ₹${tot}<br><span style="color:var(--success); font-weight:700;">Prize: ₹${t.prizePool}</span></td>
                        <td><span style="color:var(--primary)">Platform (${platformCutPercent}%): ₹${pC}</span><br><span style="color:#d946ef">Host (${hostCutPercent}%): ₹${hC}</span></td>
                        <td><button class="btn btn-primary" style="padding:8px 16px; font-size:0.85rem; background:var(--success); box-shadow:none;" onclick="aAS('${doc.id}', '${t.winnerId}', ${t.prizePool}, '${t.hostId}', ${hC})"><i class="ph-bold ph-check"></i> Authorize</button></td>
                    </tr>`;
                });
                container.innerHTML = html + '</table></div>';
            } catch(e) {}
        };
        window.aAS = async (tId, wId, prize, hId, hCut) => { 
            try { 
                if(wId && prize > 0) await updateDoc(doc(db, "users", wId), { "wallet.coins": increment(prize) }); 
                if(hId && hCut > 0) await updateDoc(doc(db, "users", hId), { "wallet.coins": increment(hCut) }); 
                await updateDoc(doc(db, "tournaments", tId), { status: 'Completed' }); 
                UI.showToast("Escrow Cleared!"); loadAdminSettlements(); 
            } catch(e) {} 
        };

        const loadAdminRecharges = async () => {
            const container = document.getElementById('admin-r-list');
            try {
                const snap = await getDocs(query(collection(db, "recharges"), where("status", "==", "pending")));
                let data = []; snap.forEach(d => data.push({id: d.id, ...d.data()})); data.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
                
                if(data.length === 0) { container.innerHTML = UI.emptyState('ph-bank', 'No Deposits', 'No pending UTR verifications.'); return; }
                
                let html = '<div class="table-responsive"><table><tr><th>Date</th><th>User</th><th>UTR</th><th>Amount</th><th>Actions</th></tr>';
                data.forEach(r => { 
                    html += `<tr>
                        <td style="font-size:0.9rem; color:var(--text-muted);">${new Date(r.createdAt).toLocaleDateString()}</td>
                        <td style="font-weight:600;">${UI.escapeHTML(r.username)}</td>
                        <td style="font-family:monospace; color:var(--primary); font-size:1.1rem; letter-spacing:1px;">${UI.escapeHTML(r.utr)}</td>
                        <td><strong style="color:var(--success); font-size:1.2rem;">₹${r.amount}</strong></td>
                        <td>
                            <div style="display:flex; gap:8px;">
                                <button class="btn btn-danger" style="padding:10px;" onclick="aHR('${r.id}', false, '${r.userId}', ${r.amount})"><i class="ph-bold ph-x"></i></button> 
                                <button class="btn btn-primary" style="padding:10px; background:var(--success); box-shadow:none;" onclick="aHR('${r.id}', true, '${r.userId}', ${r.amount})"><i class="ph-bold ph-check"></i></button>
                            </div>
                        </td>
                    </tr>`; 
                });
                container.innerHTML = html + '</table></div>';
            } catch(e) {}
        };
        window.aHR = async (rId, app, uId, amt) => { 
            try { 
                await updateDoc(doc(db, "recharges", rId), { status: app ? 'approved' : 'rejected' }); 
                if(app) await updateDoc(doc(db, "users", uId), { "wallet.coins": increment(amt) }); 
                UI.showToast(app ? 'Deposit Cleared' : 'Deposit Rejected'); loadAdminRecharges(); 
            } catch(e) {} 
        };

        const loadAdminWithdrawals = async () => {
            const container = document.getElementById('admin-w-list');
            try {
                const snap = await getDocs(query(collection(db, "withdrawals"), where("status", "==", "pending")));
                let data = []; snap.forEach(d => data.push({id: d.id, ...d.data()})); data.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
                
                if(data.length === 0) { container.innerHTML = UI.emptyState('ph-money', 'Queue Clear', 'No pending payout requests.'); return; }
                
                let html = '<div class="table-responsive"><table><tr><th>Date</th><th>User</th><th>Net Payout</th><th>Target Details</th><th>Actions</th></tr>';
                data.forEach(w => { 
                    html += `<tr>
                        <td style="font-size:0.9rem; color:var(--text-muted);">${new Date(w.createdAt).toLocaleDateString()}</td>
                        <td style="font-weight:600;">${UI.escapeHTML(w.username)}</td>
                        <td><strong style="color:var(--primary); font-size:1.2rem;">₹${w.finalAmount}</strong><br><span style="font-size:0.75rem; color:var(--text-muted);">Requested: ₹${w.requestedAmount}</span></td>
                        <td style="font-family:monospace; font-size:0.9rem; color:white; background:rgba(255,255,255,0.05); padding:8px; border-radius:6px; display:inline-block;">${UI.escapeHTML(w.details)}</td>
                        <td>
                            <div style="display:flex; gap:8px;">
                                <button class="btn btn-danger" style="padding:8px 12px; font-size:0.85rem;" onclick="aHW('${w.id}', false, '${w.userId}', ${w.requestedAmount})">Reject</button> 
                                <button class="btn btn-primary" style="padding:8px 12px; font-size:0.85rem; background:var(--success); box-shadow:none;" onclick="aHW('${w.id}', true, '${w.userId}', ${w.requestedAmount})">Pay</button>
                            </div>
                        </td>
                    </tr>`; 
                });
                container.innerHTML = html + '</table></div>';
            } catch(e) {}
        };
        // Rejection refunds the original requested amount
        window.aHW = async (wId, app, uId, amt) => { 
            try { 
                await updateDoc(doc(db, "withdrawals", wId), { status: app ? 'paid' : 'rejected' }); 
                if(!app) await updateDoc(doc(db, "users", uId), { "wallet.coins": increment(amt) }); 
                UI.showToast(app ? 'Payout Logged' : 'Refund Issued'); loadAdminWithdrawals(); 
            } catch(e) {} 
        };

        const loadAdminUsers = async () => {
            const container = document.getElementById('admin-u-list');
            try {
                const snap = await getDocs(collection(db, "users"));
                let html = '<div class="table-responsive"><table><tr><th>User Matrix</th><th>Role</th><th>Ledger</th><th>System Commands</th></tr>';
                snap.forEach(doc => { 
                    const u = doc.data(); 
                    let roleCol = u.role === 'admin' ? 'var(--primary)' : (u.role === 'host' ? '#d946ef' : 'var(--text-muted)');
                    html += `<tr>
                        <td>
                            <span style="font-weight:600; font-size:1.05rem; color:white;">${UI.escapeHTML(u.username)}</span><br>
                            <span style="font-size:0.8rem; color:var(--text-muted); font-family:monospace;">${UI.escapeHTML(u.email)}</span><br>
                            <span style="font-size:0.7rem; color:rgba(255,255,255,0.3); font-family:monospace;">ID: ${doc.id}</span>
                        </td>
                        <td><span class="badge" style="border:1px solid ${roleCol}; color:${roleCol}; background:rgba(0,0,0,0.3);">${u.role.toUpperCase()}</span></td>
                        <td style="color:var(--success); font-weight:800; font-size:1.2rem;">₹${u.wallet?.coins || 0}</td>
                        <td><button class="btn btn-outline" style="padding:8px 14px; font-size:0.85rem; border-color:var(--primary); color:var(--primary);" onclick="aEU('${doc.id}', ${u.wallet?.coins || 0}, '${UI.escapeHTML(u.username)}')"><i class="ph-bold ph-syringe"></i> Inject Assets</button></td>
                    </tr>`; 
                });
                container.innerHTML = html + '</table></div>';
            } catch(e) {}
        };
        window.aEU = (uId, c, uName) => { 
            UI.showModal(`
                <h3 style="font-family:var(--font-display); font-size:2.2rem; margin-bottom:24px;">Direct Asset Injection</h3>
                <p style="color:var(--text-muted); margin-bottom:16px;">Target: <strong style="color:white;">${uName}</strong></p>
                <div class="form-group" style="margin-bottom:32px;"><label style="display:block; margin-bottom:8px; color:var(--text-muted);">New Exact Balance (₹)</label><input type="number" id="au-wallet" value="${c}"></div>
                <button class="btn btn-primary w-100" style="width:100%; padding:14px; background:var(--accent); box-shadow:0 0 15px rgba(225,29,72,0.4);" onclick="aSU('${uId}')"><i class="ph-bold ph-warning"></i> Execute Overwrite</button>
            `); 
        };
        window.aSU = async (uId) => { 
            try { 
                await updateDoc(doc(db, "users", uId), { "wallet.coins": parseInt(document.getElementById('au-wallet').value) }); 
                UI.showToast("Injection Complete."); UI.closeModal(); loadAdminUsers(); 
            } catch(e) {} 
        };

        const loadAdminTickets = async () => {
            const container = document.getElementById('admin-tkt-list');
            try {
                const snap = await getDocs(query(collection(db, "tickets"), where("status", "==", "Open")));
                let data = []; snap.forEach(d => data.push({id: d.id, ...d.data()})); data.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                
                if(data.length === 0) { container.innerHTML = UI.emptyState('ph-headset', 'Queue Empty', 'No incoming support signals.'); return; }
                
                let html = '<div class="table-responsive"><table><tr><th>Date / Origin</th><th>Subject</th><th>Action</th></tr>';
                data.forEach(t => { 
                    let roleCol = t.role === 'host' ? '#d946ef' : 'var(--text-muted)';
                    html += `<tr>
                        <td>
                            <span style="font-weight:600; color:white;">${UI.escapeHTML(t.username)}</span> <span style="font-size:0.7rem; color:${roleCol}; padding:2px 6px; border:1px solid ${roleCol}; border-radius:4px; margin-left:6px;">${(t.role || 'player').toUpperCase()}</span><br>
                            <span style="font-size:0.8rem; color:var(--text-muted);">${new Date(t.createdAt).toLocaleDateString()}</span>
                        </td>
                        <td style="font-weight:600; font-size:1.05rem;">${UI.escapeHTML(t.subject)}</td>
                        <td>
                            <div style="display:flex; gap:8px;">
                                <button class="btn btn-primary" style="padding:8px 16px; font-size:0.85rem;" onclick="vT('${t.id}')">Engage</button> 
                                <button class="btn btn-outline" style="padding:8px 16px; font-size:0.85rem; border-color:var(--danger); color:var(--danger);" onclick="aCT('${t.id}')">Close</button>
                            </div>
                        </td>
                    </tr>`; 
                });
                container.innerHTML = html + '</table></div>';
            } catch(e) {}
        };
        window.aCT = async (tId) => { 
            try { 
                await updateDoc(doc(db, "tickets", tId), { status: 'Closed' }); 
                UI.showToast("Line Terminated."); loadAdminTickets(); 
            } catch(e) {} 
        };
        
        window.vT = async (tId) => {
            try {
                const t = (await getDoc(doc(db, "tickets", tId))).data();
                let rHtml = t.replies.length > 0 ? t.replies.map(r => `
                    <div style="max-width:85%; padding:14px 18px; border-radius:12px; font-size:0.95rem; align-self:${r.role==='admin'?'flex-end':'flex-start'}; background:${r.role==='admin'?'rgba(245, 158, 11, 0.15)':'rgba(255,255,255,0.05)'}; border:1px solid ${r.role==='admin'?'rgba(245, 158, 11, 0.3)':'var(--border)'};">
                        ${r.role==='admin'?`<strong style="font-size:0.75rem; color:var(--primary); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;">NEXUS ADMIN</strong>` : `<strong style="font-size:0.75rem; color:var(--text-muted); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;">USER</strong>`}
                        ${UI.escapeHTML(r.text)}
                    </div>
                `).join('') : '<div class="empty-state" style="padding:20px;"><p style="font-size:0.9rem;">Awaiting your response.</p></div>';
                
                UI.showModal(`
                    <h3 style="font-family:var(--font-display); font-size:2rem; margin-bottom:16px;">${UI.escapeHTML(t.subject)}</h3>
                    <div class="mt-4 mb-4" style="max-width:95%; padding:16px 20px; border-radius:12px; font-size:1rem; align-self:flex-start; background:rgba(0,0,0,0.4); border:1px solid var(--border); color:var(--text-muted); font-style:italic;">"${UI.escapeHTML(t.message)}"</div>
                    <div style="display:flex; flex-direction:column; gap:14px; height:300px; overflow-y:auto; padding:16px; background:rgba(0,0,0,0.2); border-radius:12px; border:1px solid var(--border); margin-bottom:20px;">${rHtml}</div>
                    ${t.status === 'Open' ? `<div class="form-group mt-2" style="display:flex; gap:12px;"><input type="text" id="tr-txt" placeholder="Transmit reply as Admin..." style="border-radius:10px; background:rgba(255,255,255,0.05);"><button class="btn btn-primary" style="padding:14px 20px; border-radius:10px;" onclick="addTR('${tId}')"><i class="ph-bold ph-paper-plane-right" style="font-size:1.2rem;"></i></button></div>` : '<div class="badge mt-2" style="width:100%; justify-content:center; padding:16px; border:1px solid rgba(255,42,95,0.3); background:rgba(255,42,95,0.05); color:var(--danger); font-size:0.9rem;">SUPPORT LINE TERMINATED</div>'}
                `);
            } catch(e) {}
        };
        window.addTR = async (tId) => {
            const txt = document.getElementById('tr-txt').value; if(!txt) return;
            try { 
                const r = doc(db, "tickets", tId); 
                const d = await getDoc(r); 
                const reps = d.data().replies || []; 
                reps.push({ uid: appState.user.uid, name: appState.userData.username, role: 'admin', text: txt, timestamp: Date.now() }); 
                await updateDoc(r, { replies: reps }); 
                vT(tId); 
            } catch(e) {}
        };

    </script>
</body>
</html>
