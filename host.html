<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus | Host Command</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            /* Deep Night Esports Theme - Host Specific (Slightly more purple/magenta leaning) */
            --bg-base: #030305;
            --surface: rgba(15, 15, 20, 0.65);
            --surface-hover: rgba(30, 30, 40, 0.8);
            
            --primary: #00e5ff; /* Neon Cyan */
            --primary-glow: rgba(0, 229, 255, 0.4);
            
            --accent: #d946ef; /* Fuchsia/Neon Pink for Host differentiation */
            --accent-glow: rgba(217, 70, 239, 0.4);
            
            --danger: #ff2a5f;
            --success: #00ff9d;
            
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            
            --font-display: 'Rajdhani', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            --shadow-float: 0 20px 40px -10px rgba(0,0,0,0.8);
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font-body);
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background-image: 
                radial-gradient(circle at 85% 50%, rgba(217, 70, 239, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 15% 30%, rgba(0, 229, 255, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 28px; font-family: var(--font-display); font-size: 1.1rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            border-radius: 8px; border: none; cursor: pointer; transition: var(--transition);
            position: relative; overflow: hidden;
        }
        .btn:active { transform: scale(0.96); }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--accent), #a21caf); 
            color: #fff; 
            box-shadow: 0 0 15px var(--accent-glow); 
        }
        .btn-primary:hover:not(:disabled) { 
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-2px);
            filter: brightness(1.2);
        }
        
        .btn-outline { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--text-main); 
        }
        .btn-outline:hover:not(:disabled) { 
            border-color: var(--accent); 
            color: var(--accent);
            background: rgba(217, 70, 239, 0.05);
            transform: translateY(-2px); 
        }

        input, select, textarea {
            width: 100%; padding: 14px 18px; 
            background: rgba(0,0,0,0.4); 
            border: 1px solid var(--border);
            border-radius: 8px; color: white; 
            font-family: var(--font-body); transition: var(--transition);
            font-size: 0.95rem;
        }
        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: var(--accent); 
            background: rgba(217, 70, 239, 0.02);
            box-shadow: 0 0 0 4px rgba(217, 70, 239, 0.1); 
        }

        .badge {
            padding: 6px 14px; border-radius: 6px; font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; display: inline-flex; align-items: center; gap: 6px;
        }
        .badge-live { background: rgba(255, 42, 95, 0.15); color: var(--danger); border: 1px solid rgba(255, 42, 95, 0.3); }
        .badge-upcoming { background: rgba(0, 229, 255, 0.15); color: var(--primary); border: 1px solid rgba(0, 229, 255, 0.3); }
        .badge-game { background: rgba(217, 70, 239, 0.15); color: var(--accent); border: 1px solid rgba(217, 70, 239, 0.3); }

        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000; padding: 16px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); 
            background: rgba(3, 3, 5, 0.8);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-text { font-family: var(--font-display); font-size: 2rem; font-weight: 800; color: white; letter-spacing: 1px; }

        #app-content { margin-top: 85px; padding: 20px 5%; min-height: calc(100vh - 85px); padding-bottom: 100px; max-width: 1400px; margin-left: auto; margin-right: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .dashboard-layout { display: grid; grid-template-columns: 280px 1fr; gap: 40px; }
        .sidebar { padding: 24px; display: flex; flex-direction: column; gap: 8px; position: sticky; top: 110px; height: max-content; }
        .sidebar-item { padding: 14px 20px; border-radius: 8px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 14px; color: var(--text-muted); font-weight: 500; font-size: 1.05rem;}
        .sidebar-item:hover { background: rgba(255,255,255,0.03); color: white; }
        .sidebar-item.active { background: rgba(217, 70, 239, 0.1); color: var(--accent); box-shadow: inset 3px 0 0 var(--accent); }
        
        .bottom-nav { display: none; }

        @media (max-width: 900px) {
            .dashboard-layout { grid-template-columns: 1fr; gap: 20px; }
            .sidebar { display: none; }
            .bottom-nav {
                display: flex; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 999;
                background: rgba(5, 5, 8, 0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border);
                padding: 12px 5px; padding-bottom: env(safe-area-inset-bottom, 15px); justify-content: space-around;
            }
            .b-nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-muted); font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: 0.2s; width: 65px;}
            .b-nav-item i { font-size: 1.6rem; }
            .b-nav-item.active { color: var(--accent); transform: translateY(-4px); }
            #app-content { padding-bottom: 120px; }
        }

        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-top: 24px; }
        .card { padding: 0; transition: var(--transition); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .card:hover { transform: translateY(-6px); border-color: rgba(255,255,255,0.15); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8), 0 0 20px rgba(217, 70, 239, 0.1); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }

        .skeleton { 
            background: var(--surface-hover); 
            background-image: linear-gradient(to right, var(--surface-hover) 0%, rgba(255,255,255,0.05) 20%, var(--surface-hover) 40%, var(--surface-hover) 100%); 
            background-repeat: no-repeat; background-size: 1000px 100%; animation: shimmer 2s infinite linear; border-radius: 8px; 
        }
        
        .empty-state { text-align: center; padding: 80px 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; color: var(--text-muted); }
        .empty-state i { font-size: 4.5rem; color: rgba(255,255,255,0.1); }

        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 18px 20px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: rgba(255,255,255,0.02); color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;}
        tr:hover { background: rgba(255,255,255,0.02); }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { pointer-events: auto; padding: 16px 24px; border-radius: 8px; color: white; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-float); animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1); background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(10px); border: 1px solid var(--border); min-width: 320px; font-weight: 500;}
        .toast.success { border-left: 4px solid var(--success); }
        .toast.success i { color: var(--success); font-size: 1.6rem; }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.error i { color: var(--danger); font-size: 1.6rem; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s;}
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { width: 95%; max-width: 550px; padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; background: var(--bg-base); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 0 50px rgba(0,0,0,0.8); transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .close-modal { position: absolute; top: 24px; right: 24px; cursor: pointer; color: var(--text-muted); font-size: 1.5rem; transition: var(--transition); background: rgba(255,255,255,0.05); border-radius: 8px; padding: 6px; display: flex;}
        .close-modal:hover { color: white; background: rgba(255,255,255,0.1); }

        .stat-box { text-align: center; padding: 30px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid var(--border); transition: var(--transition); }
        .stat-box:hover { background: rgba(255,255,255,0.04); transform: translateY(-4px); border-color: rgba(255,255,255,0.1);}
        .stat-value { font-family: var(--font-display); font-size: 2.8rem; font-weight: 800; color: white; margin: 8px 0; line-height: 1;}
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <img id="nav-logo-img" src="" style="display:none; height:32px;">
            <i id="nav-logo-icon" class="ph-fill ph-crosshair" style="font-size: 32px; color: var(--accent); text-shadow: 0 0 10px var(--accent-glow);"></i>
            <span class="logo-text brand-name" style="letter-spacing: 2px;">NEXUS <span style="font-size:1rem; color:var(--accent); font-weight:600; vertical-align:super;">HOST</span></span>
        </div>
        <div class="nav-actions" id="nav-auth-container">
            <div style="text-align:right; display:none; @media(min-width:600px){display:block;}">
                <span id="nav-username" style="color:white; font-weight:600;">Host</span>
            </div>
            <button class="btn btn-outline" style="border-color:var(--danger); color:var(--danger); padding: 8px; font-size: 0.9rem;" onclick="logoutUser()"><i class="ph-bold ph-sign-out"></i></button>
        </div>
    </nav>

    <div id="toast-container"></div>
    <div id="modal-container" class="modal-overlay">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <main id="app-content">
        <!-- HOST DASHBOARD -->
        <section id="view-host-dash" class="view-section active">
            <div class="dashboard-layout">
                <div class="glass sidebar">
                    <div class="sidebar-item active" data-tab="host-overview"><i class="ph-fill ph-chart-line-up"></i> Analytics</div>
                    <div class="sidebar-item" data-tab="host-create"><i class="ph-fill ph-plus-circle"></i> Create Event</div>
                    <div class="sidebar-item" data-tab="host-manage"><i class="ph-fill ph-kanban"></i> Manage Rooms</div>
                    <div class="sidebar-item" data-tab="host-wallet"><i class="ph-fill ph-wallet"></i> Earnings</div>
                    <div class="sidebar-item" data-tab="host-support"><i class="ph-fill ph-lifebuoy"></i> Support Desk</div>
                </div>
                <div class="bottom-nav" id="bnav-host">
                    <div class="b-nav-item active" data-tab="host-overview"><i class="ph-fill ph-chart-line-up"></i>Stats</div>
                    <div class="b-nav-item" data-tab="host-create"><i class="ph-fill ph-plus-circle"></i>Create</div>
                    <div class="b-nav-item" data-tab="host-manage"><i class="ph-fill ph-kanban"></i>Manage</div>
                    <div class="b-nav-item" data-tab="host-wallet"><i class="ph-fill ph-wallet"></i>Earnings</div>
                </div>
                <div class="dashboard-content" id="host-dash-content"></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, getDocs, query, where, addDoc, updateDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ_c3EaDxSZ6RrNrwQjR_TauJHrPfk_lk",
            authDomain: "designsnap-f3309.firebaseapp.com",
            databaseURL: "https://designsnap-f3309-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "designsnap-f3309",
            storageBucket: "designsnap-f3309.firebasestorage.app",
            messagingSenderId: "741888249963",
            appId: "1:741888249963:web:9540c9f68d6f0d5da9a12e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let appState = {
            user: null, userData: null,
            games: ["BGMI", "Free Fire", "Call of Duty Mobile", "Valorant"],
            brandName: "NEXUS", brandLogo: "", platformFeePercent: 10, withdrawalFeePercent: 5, hostCreationFee: 50
        };

        const UI = {
            showToast: (msg, type = 'success') => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `<i class="ph-fill ${type === 'success' ? 'ph-check-circle' : 'ph-warning-circle'}"></i> <span>${msg}</span>`;
                container.appendChild(toast);
                setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(40px)'; setTimeout(() => toast.remove(), 400); }, 4000);
            },
            showModal: (html) => {
                document.getElementById('modal-body').innerHTML = `<i class="ph-bold ph-x close-modal" onclick="closeModal()"></i>` + html;
                document.getElementById('modal-container').classList.add('active');
            },
            closeModal: () => document.getElementById('modal-container').classList.remove('active'),
            setLoading: (btnId, isLoading, text = 'Processing...') => {
                const btn = document.getElementById(btnId); if(!btn) return;
                if(isLoading) { btn.dataset.original = btn.innerHTML; btn.innerHTML = `<i class="ph-bold ph-spinner ph-spin"></i> ${text}`; btn.disabled = true; } 
                else { btn.innerHTML = btn.dataset.original; btn.disabled = false; }
            },
            escapeHTML: (str) => String(str || '').replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag)),
            emptyState: (icon, title, desc) => `<div class="empty-state"><i class="ph-duotone ${icon}"></i><h3 style="font-family:var(--font-display); font-size:2rem;">${title}</h3><p>${desc}</p></div>`
        };
        window.closeModal = UI.closeModal; 

        window.logoutUser = () => {
            signOut(auth).then(() => { window.location.href = 'index.html'; });
        };

        // Load Platform Settings
        onSnapshot(doc(db, "platform", "settings"), (docSnap) => {
            if(docSnap.exists()) {
                const data = docSnap.data();
                if(data.brandName) { appState.brandName = data.brandName; document.querySelectorAll('.brand-name').forEach(el => el.innerHTML = `${appState.brandName.toUpperCase()} <span style="font-size:1rem; color:var(--accent); font-weight:600; vertical-align:super;">HOST</span>`); }
                if(data.platformFeePercent !== undefined) appState.platformFeePercent = parseInt(data.platformFeePercent);
                if(data.withdrawalFeePercent !== undefined) appState.withdrawalFeePercent = parseInt(data.withdrawalFeePercent);
                if(data.hostCreationFee !== undefined) appState.hostCreationFee = parseInt(data.hostCreationFee);
                if(data.brandLogo) {
                    document.getElementById('nav-logo-icon').style.display = 'none';
                    const img = document.getElementById('nav-logo-img');
                    img.src = data.brandLogo; img.style.display = 'block';
                }
            }
        });

        // CORE AUTH LOGIC: Strict Host Lockout
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                appState.user = user;
                try {
                    let docSnap = await getDoc(doc(db, "users", user.uid));
                    if (!docSnap.exists()) { await new Promise(r => setTimeout(r, 1500)); docSnap = await getDoc(doc(db, "users", user.uid)); }
                    
                    if (docSnap.exists()) {
                        appState.userData = docSnap.data(); 
                        if (appState.userData.role !== 'host') {
                            // If not a host, kick them back to index
                            window.location.href = 'index.html';
                            return;
                        }
                        
                        document.getElementById('nav-username').innerText = appState.userData.username;
                        renderHostDashboard();
                    } else { window.location.href = 'index.html'; }
                } catch (e) { UI.showToast("Database Auth Blocked.", "error"); }
            } else {
                window.location.href = 'index.html'; // Kick non-logged in users
            }
        });

        const setupSidebar = (role, callback) => {
            const sideItems = document.querySelectorAll(`#view-${role}-dash .sidebar-item`);
            const botItems = document.querySelectorAll(`#bnav-${role} .b-nav-item`);
            
            const attach = (items) => {
                items.forEach(item => {
                    const newEl = item.cloneNode(true); item.parentNode.replaceChild(newEl, item);
                    newEl.addEventListener('click', (e) => {
                        sideItems.forEach(el => el.classList.remove('active'));
                        if(botItems) botItems.forEach(el => el.classList.remove('active'));
                        
                        const tab = e.currentTarget.dataset.tab;
                        document.querySelector(`#view-${role}-dash .sidebar-item[data-tab="${tab}"]`)?.classList.add('active');
                        document.querySelector(`#bnav-${role} .b-nav-item[data-tab="${tab}"]`)?.classList.add('active');
                        
                        callback(tab);
                    });
                });
            };
            attach(sideItems); if(botItems) attach(botItems);
            
            const activeTab = document.querySelector(`#view-${role}-dash .sidebar-item.active`);
            if(activeTab) callback(activeTab.dataset.tab);
        };

        const renderHostDashboard = () => {
            const container = document.getElementById('host-dash-content');
            // Keep wallet/data updated
            onSnapshot(doc(db, "users", appState.user.uid), (docSnap) => { if(docSnap.exists() && appState.userData) { appState.userData = docSnap.data(); }});
            
            setupSidebar('host', (tab) => {
                if(tab === 'host-overview') {
                    container.innerHTML = `<h2 style="font-family:var(--font-display); font-size:2.5rem; margin-bottom:24px;">Host Analytics</h2><div id="host-analytics"><div class="skeleton" style="height:150px;"></div></div>`;
                    loadHostAnalytics();
                } else if(tab === 'host-create') {
                    let gameOpts = appState.games.map(g => `<option value="${g}">${g}</option>`).join('');
                    let hostFee = appState.hostCreationFee || 0;
                    
                    container.innerHTML = `
                        <div class="glass" style="padding: 40px; position: relative; overflow:hidden;">
                            <div style="position:absolute; top:-50px; right:-50px; width:150px; height:150px; background:var(--accent); opacity:0.1; filter:blur(40px); border-radius:50%;"></div>
                            <div class="flex-between mb-4" style="display:flex; justify-content:space-between; flex-wrap: wrap; gap:10px; margin-bottom:32px;">
                                <h2 style="font-family:var(--font-display); font-size:2.5rem; margin:0;">Deploy New Event</h2>
                                <div class="badge" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); font-size:0.85rem; padding:8px 16px;">
                                    Creation Fee: <strong style="${hostFee > 0 ? 'color:var(--danger)' : 'color:var(--success)'}; margin-left:6px; font-size:1rem;">₹${hostFee}</strong>
                                </div>
                            </div>
                            
                            <form id="form-create-t">
                                <div class="grid-cards" style="grid-template-columns: 1fr 1fr; gap:20px; margin-top:0;">
                                    <div class="form-group"><label style="display:block; margin-bottom:8px; color:var(--text-muted);">Operation Title</label><input type="text" id="c-title" required></div>
                                    <div class="form-group"><label style="display:block; margin-bottom:8px; color:var(--text-muted);">Combat Sector (Game)</label><select id="c-game" required>${gameOpts}</select></div>
                                    
                                    <div class="form-group"><label style="display:block; margin-bottom:8px; color:var(--text-muted);">Format (Team Size)</label>
                                        <select id="c-team-size" required>
                                            <option value="1">Solo</option>
                                            <option value="2">Duo</option>
                                            <option value="4">Squad</option>
                                        </select>
                                    </div>
                                    <div class="form-group"><label style="display:block; margin-bottom:8px; color:var(--text-muted);">T-Zero (Start Time)</label><input type="datetime-local" id="c-time" required></div>
                                    
                                    <div class="form-group"><label style="display:block; margin-bottom:8px; color:var(--text-muted);">Entry Fee per Team (₹)</label><input type="number" id="c-fee" value="50" required></div>
                                    <div class="form-group"><label style="display:block; margin-bottom:8px; color:var(--text-muted);">Prize Pool (₹)</label><input type="number" id="c-prize" value="1000" required></div>
                                    
                                    <div class="form-group"><label style="display:block; margin-bottom:8px; color:var(--text-muted);">Max Slots (Teams)</label><input type="number" id="c-slots" value="25" required></div>

            try {
                const snap = await getDocs(query(collection(db, "tickets"), where("userId", "==", appState.user.uid)));
                let data = []; snap.forEach(d => data.push({id: d.id, ...d.data()})); data.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                
                if(data.length === 0) { container.innerHTML = UI.emptyState('ph-headset', 'All Systems Nominal', 'No open support lines.'); return; }
                let html = '<div class="table-responsive"><table><tr><th>Subject</th><th>Status</th><th>Action</th></tr>';
                data.forEach(t => { html += `<tr><td style="font-weight:600; font-size:1.05rem;">${UI.escapeHTML(t.subject)}</td><td><span class="badge" style="border:1px solid ${t.status==='Open'?'var(--primary)':'var(--text-muted)'}; color:${t.status==='Open'?'var(--primary)':'var(--text-muted)'}; background:transparent;">${t.status}</span></td><td><button class="btn btn-outline" style="padding:8px 16px; font-size:0.85rem;" onclick="vT('${t.id}')">View Comm</button></td></tr>`; });
                container.innerHTML = html + '</table></div>';
            } catch(e) {}
        };
        
        window.vT = async (tId) => {
            try {
                const t = (await getDoc(doc(db, "tickets", tId))).data();
                let rHtml = t.replies.length > 0 ? t.replies.map(r => `
                    <div style="max-width:85%; padding:14px 18px; border-radius:12px; font-size:0.95rem; align-self:${r.role==='admin'?'flex-start':'flex-end'}; background:${r.role==='admin'?'rgba(255,255,255,0.05)':'rgba(217, 70, 239, 0.15)'}; border:1px solid ${r.role==='admin'?'var(--border)':'rgba(217, 70, 239, 0.3)'};">
                        ${r.role==='admin'?`<strong style="font-size:0.75rem; color:var(--primary); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;">NEXUS ADMIN</strong>`:''}
                        ${UI.escapeHTML(r.text)}
                    </div>
                `).join('') : '<div class="empty-state" style="padding:20px;"><p style="font-size:0.9rem;">Agent response pending.</p></div>';
                
                UI.showModal(`
                    <h3 style="font-family:var(--font-display); font-size:2rem; margin-bottom:16px;">${UI.escapeHTML(t.subject)}</h3>
                    <div class="mt-4 mb-4" style="max-width:95%; padding:16px 20px; border-radius:12px; font-size:1rem; align-self:flex-end; background:rgba(0,0,0,0.4); border:1px solid var(--border); color:var(--text-muted); font-style:italic;">"${UI.escapeHTML(t.message)}"</div>
                    <div style="display:flex; flex-direction:column; gap:14px; height:300px; overflow-y:auto; padding:16px; background:rgba(0,0,0,0.2); border-radius:12px; border:1px solid var(--border); margin-bottom:20px;">${rHtml}</div>
                    ${t.status === 'Open' ? `<div class="form-group mt-2" style="display:flex; gap:12px;"><input type="text" id="tr-txt" placeholder="Transmit reply..." style="border-radius:10px; background:rgba(255,255,255,0.05);"><button class="btn btn-primary" style="padding:14px 20px; border-radius:10px;" onclick="addTR('${tId}')"><i class="ph-bold ph-paper-plane-right" style="font-size:1.2rem;"></i></button></div>` : '<div class="badge mt-2" style="width:100%; justify-content:center; padding:16px; border:1px solid rgba(255,42,95,0.3); background:rgba(255,42,95,0.05); color:var(--danger); font-size:0.9rem;">SUPPORT LINE TERMINATED</div>'}
                `);
            } catch(e) {}
        };
        window.addTR = async (tId) => {
            const txt = document.getElementById('tr-txt').value; if(!txt) return;
            try { const r = doc(db, "tickets", tId); const d = await getDoc(r); const reps = d.data().replies || []; reps.push({ uid: appState.user.uid, name: appState.userData.username, role: appState.userData.role, text: txt, timestamp: Date.now() }); await updateDoc(r, { replies: reps }); vT(tId); } catch(e) {}
        };

    </script>
</body>
</html>
