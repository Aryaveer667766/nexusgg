<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus | Host Command</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            /* Cinematic, High-Energy Neon & Royal Aesthetic */
            --bg-base: #030305; 
            --surface: rgba(15, 15, 20, 0.7); 
            --surface-hover: rgba(30, 30, 40, 0.85);
            
            --primary: #00e5ff; /* Electric Cyan */
            --accent: #d946ef; /* Neon Fuchsia */
            --accent-glow: rgba(217, 70, 239, 0.5);
            --royal-gold: #fbbf24; /* Modern Royal Gold */
            --gold-glow: rgba(251, 191, 36, 0.3);
            
            --danger: #ff2a5f; 
            --success: #00ff9d; 
            --text-main: #ffffff; 
            --text-muted: #9ca3af; 
            --border: rgba(255, 255, 255, 0.08);
            
            --font-display: 'Rajdhani', sans-serif; 
            --font-body: 'Inter', sans-serif;
            
            --shadow-float: 0 20px 40px -10px rgba(0,0,0,0.9); 
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: var(--font-body); 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            line-height: 1.6; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
            background-image: 
                radial-gradient(circle at 85% 0%, rgba(217, 70, 239, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 15% 100%, rgba(0, 229, 255, 0.08) 0%, transparent 40%);
            background-attachment: fixed; 
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; } 
        ::-webkit-scrollbar-track { background: var(--bg-base); } 
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; } 
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .glass { 
            background: var(--surface); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); 
        }

        .btn { 
            display: inline-flex; align-items: center; justify-content: center; gap: 8px; 
            padding: 12px 28px; font-family: var(--font-display); font-size: 1.1rem; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px; 
            border-radius: 8px; border: none; cursor: pointer; transition: var(--transition); 
            position: relative; overflow: hidden; 
        }
        .btn:active { transform: scale(0.96); }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--accent), #9333ea); 
            color: #fff; 
            box-shadow: 0 0 20px var(--accent-glow); 
        }
        .btn-primary:hover:not(:disabled) { 
            box-shadow: 0 0 30px var(--accent-glow); 
            transform: translateY(-3px); 
            filter: brightness(1.2); 
        }
        
        .btn-outline { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--text-main); 
        }
        .btn-outline:hover:not(:disabled) { 
            border-color: var(--accent); 
            color: var(--accent); 
            background: rgba(217, 70, 239, 0.05); 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        
        .btn-danger { background: rgba(255, 42, 95, 0.1); border: 1px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; box-shadow: 0 0 15px rgba(255, 42, 95, 0.4);}
        
        .btn-gold { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--royal-gold); color: var(--royal-gold); }
        .btn-gold:hover { background: var(--royal-gold); color: #000; box-shadow: 0 0 15px var(--gold-glow);}

        input, select, textarea { 
            width: 100%; padding: 14px 18px; 
            background: rgba(0,0,0,0.5); 
            border: 1px solid var(--border); 
            border-radius: 8px; color: white; 
            font-family: var(--font-body); transition: var(--transition); 
            font-size: 0.95rem; resize: vertical; 
        }
        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: var(--accent); 
            background: rgba(217, 70, 239, 0.03); 
            box-shadow: 0 0 0 4px rgba(217, 70, 239, 0.15); 
        }

        .badge { 
            padding: 6px 14px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1.5px; display: inline-flex; align-items: center; gap: 6px; 
        }
        .badge-live { background: rgba(255, 42, 95, 0.15); color: var(--danger); border: 1px solid rgba(255, 42, 95, 0.3); }
        .badge-upcoming { background: rgba(217, 70, 239, 0.15); color: var(--accent); border: 1px solid rgba(217, 70, 239, 0.3); }
        .badge-game { background: rgba(0, 229, 255, 0.15); color: var(--primary); border: 1px solid rgba(0, 229, 255, 0.3); }

        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000; padding: 16px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); 
            background: rgba(3, 3, 5, 0.85); 
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); 
        }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-text { font-family: var(--font-display); font-size: 2.2rem; font-weight: 800; color: white; letter-spacing: 2px; text-transform: uppercase;}
        
        /* Mobile Hamburger & Drawer Styles */
        .mobile-menu-btn { 
            display: none; background: transparent; border: none; color: white; 
            font-size: 2.2rem; cursor: pointer; transition: var(--transition);
        }
        .mobile-menu-btn:hover { color: var(--accent); transform: scale(1.1); }
        
        .drawer-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 1999; display: none; opacity: 0; transition: 0.4s ease; 
        }
        .drawer-overlay.open { display: block; opacity: 1; }

        .mobile-drawer { 
            position: fixed; top: 0; right: -100%; width: 300px; height: 100vh; 
            background: linear-gradient(180deg, rgba(15,15,20,0.95) 0%, rgba(5,5,8,0.98) 100%); 
            backdrop-filter: blur(30px); border-left: 1px solid var(--border); 
            z-index: 2000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
            display: flex; flex-direction: column; padding: 32px 24px; box-shadow: -20px 0 50px rgba(0,0,0,0.8); 
        }
        .mobile-drawer.open { right: 0; }
        
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px;}
        .drawer-close { font-size: 2rem; color: var(--text-muted); cursor: pointer; transition: var(--transition); }
        .drawer-close:hover { color: var(--danger); transform: rotate(90deg); }

        #app-content { margin-top: 90px; padding: 20px 5%; min-height: calc(100vh - 90px); padding-bottom: 60px; max-width: 1400px; margin-left: auto; margin-right: auto; }
        .view-section { display: none; } 
        .view-section.active { display: block; animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .dashboard-layout { display: grid; grid-template-columns: 280px 1fr; gap: 40px; }
        .sidebar { padding: 24px; display: flex; flex-direction: column; gap: 8px; position: sticky; top: 110px; height: max-content; }
        .sidebar-item { 
            padding: 16px 20px; border-radius: 12px; cursor: pointer; transition: var(--transition); 
            display: flex; align-items: center; gap: 14px; color: var(--text-muted); font-weight: 600; font-size: 1.1rem;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.03); color: white; transform: translateX(5px); }
        .sidebar-item.active { background: linear-gradient(90deg, rgba(217, 70, 239, 0.15) 0%, transparent 100%); color: var(--accent); border-left: 4px solid var(--accent); }

        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-top: 24px; }
        .card { 
            padding: 0; transition: var(--transition); display: flex; flex-direction: column; overflow: hidden; position: relative; 
            animation: fadeUpStagger 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px);
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.9), 0 0 30px rgba(217, 70, 239, 0.15); }
        
        @keyframes fadeUpStagger { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        
        .skeleton { background: var(--surface-hover); background-image: linear-gradient(to right, var(--surface-hover) 0%, rgba(255,255,255,0.05) 20%, var(--surface-hover) 40%, var(--surface-hover) 100%); background-repeat: no-repeat; background-size: 1000px 100%; animation: shimmer 2s infinite linear; border-radius: 8px; }
        .empty-state { text-align: center; padding: 80px 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; color: var(--text-muted); }
        .empty-state i { font-size: 5rem; color: rgba(255,255,255,0.05); filter: drop-shadow(0 0 20px rgba(217, 70, 239, 0.2)); }
        
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 16px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; } 
        th, td { padding: 20px 24px; text-align: left; border-bottom: 1px solid var(--border); } 
        th { background: rgba(255,255,255,0.03); color: var(--text-muted); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1.5px;} 
        tr:hover { background: rgba(255,255,255,0.02); }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { pointer-events: auto; padding: 18px 24px; border-radius: 12px; color: white; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-float); animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1); background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(10px); border: 1px solid var(--border); min-width: 320px; font-weight: 600; font-size: 1.05rem;}
        .toast.success { border-left: 4px solid var(--success); } .toast.success i { color: var(--success); font-size: 1.8rem; } 
        .toast.error { border-left: 4px solid var(--danger); } .toast.error i { color: var(--danger); font-size: 1.8rem; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s ease;} 
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { width: 95%; max-width: 600px; padding: 48px; position: relative; max-height: 90vh; overflow-y: auto; background: linear-gradient(180deg, rgba(20,20,25,1) 0%, rgba(10,10,15,1) 100%); border: 1px solid var(--border); border-radius: 24px; box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.1); transform: translateY(30px) scale(0.95); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); } 
        .modal-overlay.active .modal-content { transform: translateY(0) scale(1); }
        .close-modal { position: absolute; top: 24px; right: 24px; cursor: pointer; color: var(--text-muted); font-size: 1.8rem; transition: var(--transition); background: rgba(255,255,255,0.05); border-radius: 50%; padding: 8px; display: flex;} 
        .close-modal:hover { color: var(--danger); background: rgba(255,42,95,0.1); transform: rotate(90deg); }

        .stat-box { text-align: center; padding: 32px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid var(--border); transition: var(--transition); position: relative; overflow: hidden;} 
        .stat-box::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--border); transition: var(--transition); }
        .stat-box:hover { background: rgba(255,255,255,0.04); transform: translateY(-6px); box-shadow: 0 15px 30px rgba(0,0,0,0.5);} 
        .stat-box:hover::before { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .stat-value { font-family: var(--font-display); font-size: 3.5rem; font-weight: 800; color: white; margin: 12px 0 0 0; line-height: 1; text-shadow: 0 4px 10px rgba(0,0,0,0.5);}

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .dashboard-layout { grid-template-columns: 1fr; gap: 20px; } 
            .sidebar { display: none; }
            .mobile-menu-btn { display: block; }
            .hide-mobile { display: none !important; }
            .nav-actions { gap: 12px; }
            .stat-value { font-size: 2.8rem; }
            .modal-content { padding: 32px 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <img id="nav-logo-img" src="" style="display:none; height:36px;">
            <i id="nav-logo-icon" class="ph-fill ph-crosshair" style="font-size: 36px; color: var(--accent); text-shadow: 0 0 15px var(--accent-glow);"></i>
            <span class="logo-text brand-name">NEXUS <span style="font-size:1.1rem; color:var(--royal-gold); font-weight:700; vertical-align:super; letter-spacing:1px; text-shadow: 0 0 10px var(--gold-glow);">HOST</span></span>
        </div>
        <div class="nav-actions" id="nav-auth-container">
            <button class="btn btn-outline hide-mobile" style="border-color:var(--danger); color:var(--danger); padding: 10px 16px; font-size: 0.95rem;" onclick="logoutUser()"><i class="ph-bold ph-power"></i> Terminate</button>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()"><i class="ph-bold ph-list"></i></button>
        </div>
    </nav>

    <!-- Mobile Drawer Overlay & Menu -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="toggleMobileMenu()"></div>
    <div class="mobile-drawer" id="mobileDrawer">
        <div class="drawer-header">
            <span class="logo-text brand-name" style="font-size:1.5rem;">NEXUS <span style="color:var(--royal-gold);">HOST</span></span>
            <i class="ph-bold ph-x drawer-close" onclick="toggleMobileMenu()"></i>
        </div>
        <div style="display: flex; flex-direction: column; gap: 12px; flex: 1;">
            <div class="sidebar-item active" data-tab="host-overview"><i class="ph-fill ph-chart-line-up"></i> Analytics</div>
            <div class="sidebar-item" data-tab="host-create"><i class="ph-fill ph-rocket-launch"></i> Deploy Event</div>
            <div class="sidebar-item" data-tab="host-manage"><i class="ph-fill ph-crosshair"></i> Operations</div>
            <div class="sidebar-item" data-tab="host-wallet"><i class="ph-fill ph-vault"></i> Host Ledger</div>
            <div class="sidebar-item" data-tab="host-support"><i class="ph-fill ph-headset"></i> Support Line</div>
        </div>
        <div style="border-top: 1px solid var(--border); padding-top: 24px; margin-top: auto;">
            <div style="color:var(--text-muted); font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Active Session</div>
            <div style="color:white; font-weight:700; font-size:1.1rem; margin-bottom:16px;" id="drawer-username">Host</div>
            <button class="btn btn-danger w-100" style="width:100%; padding: 12px;" onclick="logoutUser()"><i class="ph-bold ph-power"></i> Terminate Link</button>
        </div>
    </div>

    <div id="toast-container"></div>
    <div id="modal-container" class="modal-overlay"><div class="modal-content" id="modal-body"></div></div>

    <main id="app-content">
        <section id="view-host-dash" class="view-section active">
            <div class="dashboard-layout">
                <!-- Desktop Sidebar -->
                <div class="glass sidebar">
                    <div style="padding: 0 10px 20px 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border);">
                        <div style="color:var(--text-muted); font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px;">Commander ID</div>
                        <div style="color:white; font-weight:700; font-size:1.2rem; font-family:var(--font-display); letter-spacing:1px;" id="desk-username">Host</div>
                    </div>
                    <div class="sidebar-item active" data-tab="host-overview"><i class="ph-fill ph-chart-line-up"></i> Analytics</div>
                    <div class="sidebar-item" data-tab="host-create"><i class="ph-fill ph-rocket-launch"></i> Deploy Event</div>
                    <div class="sidebar-item" data-tab="host-manage"><i class="ph-fill ph-crosshair"></i> Operations</div>
                    <div class="sidebar-item" data-tab="host-wallet"><i class="ph-fill ph-vault"></i> Host Ledger</div>
                    <div class="sidebar-item" data-tab="host-support"><i class="ph-fill ph-headset"></i> Support Line</div>
                </div>
                
                <div class="dashboard-content" id="host-dash-content"></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, getDocs, query, where, addDoc, updateDoc, deleteDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ_c3EaDxSZ6RrNrwQjR_TauJHrPfk_lk",
            authDomain: "designsnap-f3309.firebaseapp.com",
            databaseURL: "https://designsnap-f3309-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "designsnap-f3309",
            storageBucket: "designsnap-f3309.firebasestorage.app",
            messagingSenderId: "741888249963",
            appId: "1:741888249963:web:9540c9f68d6f0d5da9a12e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let appState = {
            user: null, userData: null,
            games: ["BGMI", "Free Fire", "Call of Duty Mobile", "Valorant"],
            brandName: "NEXUS", brandLogo: "", platformFeePercent: 10, withdrawalFeePercent: 5, hostCreationFee: 50, upiId: "gpay-11245353662@okbizaxis"
        };

        const UI = {
            showToast: (msg, type = 'success') => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div'); toast.className = `toast ${type}`;
                toast.innerHTML = `<i class="ph-fill ${type === 'success' ? 'ph-check-circle' : 'ph-warning-circle'}"></i> <span>${msg}</span>`;
                container.appendChild(toast);
                setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(50px)'; setTimeout(() => toast.remove(), 500); }, 4000);
            },
            showModal: (html) => {
                document.getElementById('modal-body').innerHTML = `<i class="ph-bold ph-x close-modal" onclick="closeModal()"></i>` + html;
                document.getElementById('modal-container').classList.add('active');
            },
            closeModal: () => document.getElementById('modal-container').classList.remove('active'),
            setLoading: (btnId, isLoading, text = 'Processing...') => {
                const btn = document.getElementById(btnId); if(!btn) return;
                if(isLoading) { btn.dataset.original = btn.innerHTML; btn.innerHTML = `<i class="ph-bold ph-spinner ph-spin"></i> ${text}`; btn.disabled = true; } 
                else { btn.innerHTML = btn.dataset.original; btn.disabled = false; }
            },
            escapeHTML: (str) => String(str || '').replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag)),
            emptyState: (icon, title, desc) => `<div class="empty-state"><i class="ph-duotone ${icon}"></i><h3 style="font-family:var(--font-display); font-size:2.5rem; letter-spacing:1px; margin-bottom:8px;">${title}</h3><p style="font-size:1.1rem;">${desc}</p></div>`
        };
        window.closeModal = UI.closeModal; 
        window.logoutUser = () => { signOut(auth).then(() => { window.location.href = 'index.html'; }); };

        // Mobile Menu Logic
        window.toggleMobileMenu = () => {
            const drawer = document.getElementById('mobileDrawer');
            const overlay = document.getElementById('drawerOverlay');
            if (drawer.classList.contains('open')) {
                drawer.classList.remove('open'); overlay.classList.remove('open');
            } else {
                drawer.classList.add('open'); overlay.classList.add('open');
            }
        };

        onSnapshot(doc(db, "platform", "settings"), (docSnap) => {
            if(docSnap.exists()) {
                const data = docSnap.data();
                if(data.brandName) { appState.brandName = data.brandName; document.querySelectorAll('.brand-name').forEach(el => el.innerHTML = `${appState.brandName.toUpperCase()} <span style="font-size:1.1rem; color:var(--royal-gold); font-weight:700; vertical-align:super; letter-spacing:1px; text-shadow: 0 0 10px var(--gold-glow);">HOST</span>`); }
                if(data.platformFeePercent !== undefined) appState.platformFeePercent = parseInt(data.platformFeePercent);
                if(data.withdrawalFeePercent !== undefined) appState.withdrawalFeePercent = parseInt(data.withdrawalFeePercent);
                if(data.hostCreationFee !== undefined) appState.hostCreationFee = parseInt(data.hostCreationFee);
                if(data.brandLogo) { document.getElementById('nav-logo-icon').style.display = 'none'; const img = document.getElementById('nav-logo-img'); img.src = data.brandLogo; img.style.display = 'block'; }
            }
        });

        // CORE AUTH & BAN LOCKOUT LOGIC
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                appState.user = user;
                try {
                    let docSnap = await getDoc(doc(db, "users", user.uid));
                    if (!docSnap.exists()) { await new Promise(r => setTimeout(r, 1500)); docSnap = await getDoc(doc(db, "users", user.uid)); }
                    if (docSnap.exists()) {
                        appState.userData = docSnap.data(); 
                        
                        // Strict Ban Lockout Enforcement
                        if(appState.userData.isBanned) {
                            document.body.innerHTML = `
                                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:#050303; color:white; text-align:center; padding:20px;">
                                    <i class="ph-duotone ph-warning-octagon" style="font-size:6rem; color:#ff2a5f; margin-bottom:20px; filter:drop-shadow(0 0 20px rgba(255,42,95,0.5));"></i>

            } catch(e) {}
        };
        window.addTR = async (tId) => { const txt = document.getElementById('tr-txt').value; if(!txt) return; try { const r = doc(db, "tickets", tId); const d = await getDoc(r); const reps = d.data().replies || []; reps.push({ uid: appState.user.uid, name: appState.userData.username, role: 'host', text: txt, timestamp: Date.now() }); await updateDoc(r, { replies: reps }); vT(tId); } catch(e) {} };
    </script>
</body>
